<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
.container{max-width:600px;margin:auto;padding:15px;}
h2{text-align:center;}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08);margin-bottom:15px;}
label{display:block;margin-top:12px;font-weight:bold;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
textarea{min-height:80px;resize:vertical;}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.primary{background:#2a4d69;color:white;}
.secondary{background:#888;color:white;}
.danger{background:#c0392b;color:white;}
.hidden{display:none;}
.truckListConfirmed{margin-top:10px;background:#eef3f7;padding:10px;border-radius:6px;}
.error{border:2px solid red !important;background:#ffe6e6;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000;}
.modalContent{background:white;width:90%;max-width:700px;border-radius:12px;padding:10px;}
</style>
</head>
<body>

<div class="container">
<h2>📋 Skiftrapport</h2>
<button class="primary" onclick="openStats()">📊 Visa statistik</button>

<form id="form" class="card">
<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus" onchange="toggleTruck()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckContainer" class="hidden">
<div id="truckFields"></div>
<div id="truckConfirmed" class="truckListConfirmed"></div>
</div>

<label>Maskiner & Verktyg</label>
<select id="maskin" onchange="toggleMachine()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="maskContainer" class="hidden">
<div id="maskFields"></div>
<div id="maskConfirmed" class="truckListConfirmed"></div>
</div>

<label>Daglig tillsyn truckar</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="tillsynBox" class="hidden">
<textarea id="tillsynfel" placeholder="Orsak"></textarea>
</div>

<label>Rengöring av Bandningsmaskiner</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="rengoringBox" class="hidden">
<textarea id="rengoringKommentar" placeholder="Orsak"></textarea>
</div>

<label>Övriga driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="submit" class="primary">Skicka</button>
<button type="button" class="secondary" onclick="clearForm()">Börja om</button>
</form>
</div>

<div id="statsModal" class="modal">
  <div class="modalContent">
    <button class="danger" onclick="closeStats()">Stäng</button>
    <iframe 
      id="statsFrame" 
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQY0jbcHllFP-BC4h08x-mU28_9QuPBKOhcB4ue4HFUV8G7daNOsfoTUbAfDnMKmKm2-2T2NDLGDZIW/pubhtml?widget=true&amp;headers=false" 
      width="100%" 
      height="500">
    </iframe>
  </div>
</div>

<script>
datum.valueAsDate = new Date();
let truckArray = [];
let machineArray = [];

// ---------- MODALS ----------
function openStats(){let f=document.getElementById("statsFrame");f.src=f.src.split("&t=")[0]+"&t="+new Date().getTime();document.getElementById("statsModal").style.display="flex";}
function closeStats(){document.getElementById("statsModal").style.display="none";}

// ---------- TOGGLE FIELDS ----------
function toggleField(sel,box){document.getElementById(box).style.display=document.getElementById(sel).value==="NOK"?"block":"none";}

function toggleTruck(){if(truckstatus.value==="NOK"){truckContainer.style.display="block";if(truckFields.childElementCount===0) createTruckInput();}else{truckContainer.style.display="none";truckFields.innerHTML="";truckConfirmed.innerHTML="";truckArray=[];}}

function toggleMachine(){if(maskin.value==="NOK"){maskContainer.style.display="block";if(maskFields.childElementCount===0) createMachineInput();}else{maskContainer.style.display="none";maskFields.innerHTML="";maskConfirmed.innerHTML="";machineArray=[];}}

// ---------- CREATE INPUTS ----------
function createTruckInput(){truckFields.innerHTML=`<select id="truckId"><option value="">Välj Truck</option><option>TVS-01</option><option>TVS-02</option><option>TVS-03</option><option>TVS-04</option><option>TVS-05</option><option>Extra truck</option></select><select id="truckFel"><option value="">Välj Feltyp</option><option>Hydraulik/Olja</option><option>Chassi</option><option>Batteri</option><option>Övrigt</option></select><textarea id="truckKom" placeholder="Orsak"></textarea><button type="button" onclick="confirmTruck()">Bekräfta</button>`;}

function createMachineInput(){maskFields.innerHTML=`<select id="machineId"><option value="">Välj Maskin</option><option>Maskin-01</option><option>Maskin-02</option><option>Extra maskin</option></select><select id="machineFel"><option value="">Välj Feltyp</option><option>Hydraulik/Olja</option><option>Chassi</option><option>Elektronik</option><option>Övrigt</option></select><textarea id="machineKom" placeholder="Orsak"></textarea><button type="button" onclick="confirmMachine()">Bekräfta</button>`;}

// ---------- CONFIRM ----------
function confirmTruck(){let id=truckId.value,fel=truckFel.value,kom=truckKom.value;if(!id||!fel){if(!id)truckId.classList.add("error");else truckId.classList.remove("error");if(!fel)truckFel.classList.add("error");else truckFel.classList.remove("error");return;} truckArray.push({id,fel,kom}); renderConfirmedTrucks(); truckId.value=""; truckFel.value=""; truckKom.value="";}

function confirmMachine(){let id=machineId.value,fel=machineFel.value,kom=machineKom.value;if(!id||!fel){if(!id)machineId.classList.add("error");else machineId.classList.remove("error");if(!fel)machineFel.classList.add("error");else machineFel.classList.remove("error");return;} machineArray.push({id,fel,kom}); renderConfirmedMachines(); machineId.value=""; machineFel.value=""; machineKom.value="";}

// ---------- RENDER ----------
function renderConfirmedTrucks(){let html="";truckArray.forEach((t,i)=>{html+=`${i+1}. ${t.id} (${t.fel})`;if(t.kom) html+=` - ${t.kom}`;html+="<br>";}); truckConfirmed.innerHTML=html;}
function renderConfirmedMachines(){let html="";machineArray.forEach((m,i)=>{html+=`${i+1}. ${m.id} (${m.fel})`;if(m.kom) html+=` - ${m.kom}`;html+="<br>";}); maskConfirmed.innerHTML=html;}

// ---------- VALIDATE ----------
function validate(){document.querySelectorAll("input,select,textarea").forEach(el=>el.classList.remove("error"));let valid=true;if(avdelning.value===""){avdelning.classList.add("error");valid=false;}if(truckstatus.value==="NOK"&&truckArray.length===0){truckstatus.classList.add("error");valid=false;}if(maskin.value==="NOK"&&machineArray.length===0){maskin.classList.add("error");valid=false;}return valid;}

// ---------- GET SHIFT ----------
function getSkift(){let n=new Date();let m=n.getHours()*60+n.getMinutes();if(m>=350&&m<=480)return"Nattskift";if(m>=840&&m<=1020)return"Dagskift";if(m>=1320||m<=120)return"Kvällsskift";return"Okänt Skift";}

// ---------- CLEAR FORM ----------
function clearForm(){form.reset();truckArray=[];machineArray=[];truckFields.innerHTML="";truckConfirmed.innerHTML="";maskFields.innerHTML="";maskConfirmed.innerHTML="";truckContainer.style.display="none";maskContainer.style.display="none";datum.valueAsDate=new Date();}

// ---------- SUBMIT ----------
form.addEventListener("submit",async function(e){
  e.preventDefault(); if(!validate()) return;
  let body="Datum: "+datum.value+"\nAvdelning: "+avdelning.value+"\nTruckstatus: "+truckstatus.value+"\n";
  truckArray.forEach(t=>{body+="- "+t.id+" ("+t.fel+") "+t.kom+"\n";});
  body+="Maskiner: "+maskin.value+"\n"; machineArray.forEach(m=>{body+="- "+m.id+" ("+m.fel+") "+m.kom+"\n";});
  body+="\nDaglig tillsyn: "+tillsyn.value+"\nRengöring: "+rengoring.value+"\nDriftstörningar:\n"+drift.value+"\nAvvikelse:\n"+avvikelse.value+"\nÅtgärd:\n"+atgard.value;

  async function sendDataToWebApp(data){
    try{await fetch("https://script.google.com/macros/s/AKfycbzfIdO_XYpu7sbL1mxEw6JWNeuw15PFIi83ogSTUxdAwVZ1b1K0DCbmS9dV6ptFTw238w/exec",{method:"POST",mode:"no-cors",body:JSON.stringify(data)});}catch(err){console.error(err);alert("Fel vid skickande: "+err);}
  }

  await sendDataToWebApp({
    datum: datum.value, avdelning: avdelning.value, skift: getSkift(), truckstatus: truckstatus.value, truckar: truckArray,
    maskin: maskin.value, maskiner: machineArray, tillsyn: tillsyn.value, tillsynfel: tillsynfel.value,
    rengoring: rengoring.value, rengoringKommentar: rengoringKommentar.value, drift: drift.value,
    avvikelse: avvikelse.value, atgard: atgard.value
  });

  let subject="Skiftrapport "+datum.value+" - "+getSkift();
  let separator=(navigator.userAgent.toLowerCase().includes("windows")||navigator.userAgent.toLowerCase().includes("outlook"))?";":",";
  let emails=["rapport.vovlo@samhall.se","volvooc@samhall.onmicrosoft.com"].join(separator);

  window.location.href="mailto:"+emails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
});
</script>
</body>
</html>
