<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skiftrapport</title>
    
    <link rel="icon" type="image/png" href="icon.png" sizes="192x192">
    <link rel="shortcut icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#5b5fc7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rapport">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd/idb-keyval-iife.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --teams-purple: #5b5fc7; --teams-bg: #e8eaed; 
            --teams-card: #ffffff; --teams-border: #d1d1d1; --text-main: #242424;
            --text-sec: #616161; --danger: #c0392b; --success: #27ae60;
            --base-font: 16px; --label-font: 0.85rem; --h2-font: 1.3rem;
            --error-glow: 0 0 15px rgba(192, 57, 43, 0.4);
            --pastel-green: #c1e1c1; --pastel-red: #ffffff;
            --pastel-green-text: #1e4620; --pastel-red-text: #721c24;
        }
        body.large-text { --base-font: 20px; --label-font: 1.1rem; --h2-font: 1.6rem; }
        body.dark-mode { 
            --teams-bg: #111111; --teams-card: #202020; --teams-border: #444444; 
            --text-main: #ffffff; --text-sec: #adadad; --teams-purple: #7f85f5;
            --pastel-green: #2d4a2d; --pastel-red: #4d1f1f;
            --pastel-green-text: #a8e6cf; --pastel-red-text: #ff8b94;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0; background: var(--teams-bg); color: var(--text-main);
            line-height: 1.5; transition: background 0.3s, font-size 0.2s;
            font-size: var(--base-font); overscroll-behavior: none; width: 100%; overflow-x: hidden;
        }
        .container { 
            width: 100%; max-width: 500px; margin: 0 auto; padding: 12px; 
            padding-top: calc(12px + env(safe-area-inset-top)); 
            padding-bottom: calc(40px + env(safe-area-inset-bottom)); 
        }
        .icon { width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 8px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--teams-card); padding: 10px; border-radius: 8px; border: 1px solid var(--teams-border); }
        .switch-group { display: flex; align-items: center; gap: 8px; }
        .theme-switch { display: inline-block; height: 20px; position: relative; width: 38px; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 2px; content: ""; height: 16px; left: 2px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }
        h2 { text-align: center; margin: 15px 0; font-size: var(--h2-font); display: flex; align-items: center; justify-content: center; }
        .card { 
            background: var(--teams-card); padding: 20px; border-radius: 12px; 
            border: 1px solid var(--teams-border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 20px; transition: transform 0.2s, box-shadow 0.3s, border-color 0.3s;
            position: relative; width: 100%;
        }
        .card.error-attention { border-color: var(--danger); box-shadow: var(--error-glow); transform: scale(1.01); }
        .error-msg { color: #fff; background: var(--danger); font-size: 0.75rem; padding: 4px 10px; border-radius: 4px; margin-bottom: 8px; display: none; font-weight: bold; animation: fadeIn 0.3s; }
        .error-attention .error-msg { display: inline-block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: var(--label-font); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--teams-border); font-size: var(--base-font); background-color: var(--teams-card); color: var(--text-main); outline: none; display: block; -webkit-appearance: none; }
        .machine-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .machine-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .machine-circle { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--teams-border); overflow: hidden; background: #fff; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; padding: 5px; }
        .machine-circle img { width: 100%; height: 100%; object-fit: contain; } 
        .machine-item.active .machine-circle { border-color: var(--teams-purple); transform: scale(1.08); background: rgba(91, 95, 199, 0.05); }
        .machine-label { font-size: 0.7rem; font-weight: 600; text-align: center; color: var(--text-sec); }
        .segmented-control { display: flex; background: var(--teams-bg); padding: 4px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--teams-border); }
        .segment-btn { flex: 1; border: none; padding: 10px; background: transparent; color: var(--text-sec); font-weight: 600; border-radius: 6px; cursor: pointer; }
        .segment-btn.active:not(.nok) { background: var(--pastel-green); color: var(--pastel-green-text); }
        .segment-btn.active.nok { background: var(--pastel-red); color: var(--pastel-red-text); }
        button { padding: 12px; border: none; border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .primary { background: var(--teams-purple); color: white; flex: 2; }
        .secondary { background: var(--teams-card); color: var(--text-main); border: 1px solid var(--teams-border); flex: 1; }
        .danger { background: var(--danger); color: white; }
        .add-btn { background: var(--success); color: white; margin-top: 5px; width: 100%; }
        .hidden { display: none; }
        .list-container { margin-top: 10px; background: var(--teams-bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--teams-purple); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--teams-border); font-size: 0.9em; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--teams-card); width: 95%; max-width: 800px; border-radius: 12px; padding: 15px; height: 90vh; display: flex; flex-direction: column; }
        .version-text { text-align: center; font-size: 10px; color: var(--text-sec); margin-top: 20px; opacity: 0.5; }
        .top-button-row { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div class="switch-group">
            <span style="font-size: 11px; font-weight: 600;">Stor text</span>
            <label class="theme-switch"><input type="checkbox" id="largeTextToggle" onclick="toggleLargeText(); vibrate(30);"><div class="slider"></div></label>
        </div>
        <div class="switch-group">
            <span style="font-size: 11px; font-weight: 600;">Mörkt läge</span>
            <label class="theme-switch"><input type="checkbox" id="darkmodeToggle" onclick="toggleDarkMode(); vibrate(30);"><div class="slider"></div></label>
        </div>
    </div>

    <h2>
        <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        Skiftrapport
    </h2>

    <div class="top-button-row">
        <button class="secondary" onclick="openStats(); vibrate(30);">Statistik</button>
        <button class="secondary" onclick="window.open('https://docs.google.com/spreadsheets/d/1Pl8CX0uS1047P2SvNceA64yn0HRr9YSgnwXpzSFRjtw', '_blank'); vibrate(30);">Kalkylark</button>
    </div>

    <form id="reportForm" novalidate>
        <div class="card" id="card-person">
            <div class="error-msg">⚠︎ Fyll i alla obligatoriska fält!</div>
            <label>Rapportör *</label>
            <input type="text" id="signatur" placeholder="Ditt namn..." required class="save-data">
            <label>Datum *</label>
            <input type="date" id="datum" required class="save-data">
            <label>Avdelning *</label>
            <select id="avdelning" required class="save-data">
                <option value="">-- Välj avdelning --</option>
                <option value="TVS-Inne">TVS-Inne</option>
                <option value="TVS-Ute">TVS-Ute</option>
                <option value="TPB-Inne">TPB-Inne</option>
                <option value="TPB-Ute">TPB-Ute</option>
            </select>
        </div>

        <div class="card" id="card-truck">
            <div class="error-msg">⚠︎ Du har valt NOK – Lägg till minst en truck i listan!</div>
            <label>Truckstatus</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-truck-ok" onclick="setSegment('truck', 'OK'); vibrate(30);">OK</button>
                <button type="button" class="segment-btn" id="btn-truck-nok" onclick="setSegment('truck', 'NOK'); vibrate(30);">Felanmälan (NOK)</button>
            </div>
            <input type="hidden" id="truck" value="OK" class="save-data">
            <div id="truckContainer" class="hidden">
                <select id="truckId">
                    <option value="">-- Välj Truck --</option>
                    <option>TVS-01</option><option>TVS-02</option><option>TVS-03</option><option>TVS-04</option><option>TVS-05</option><option>TVS-06</option><option>TVS-13</option><option>TVS-22</option><option>TVS-23</option><option>TVS-33</option><option>TVS-34</option><option>TPB-07</option><option>TPB-08</option><option>TPB-09</option><option>TPB-10</option><option>TPB-14</option><option>TPB-15</option><option>TPB-20</option><option>TPB-21</option><option>Extra truck</option><option>Grå Skjutsativ</option>
                </select>
                <select id="truckFel">
                    <option value="">-- Feltyp --</option>
                    <option>Hydraulik/Olja</option><option>Chassi</option><option>Stativ</option><option>Batteri</option><option>Drag</option><option>Däck</option><option>Linde Connect</option><option>Övrigt</option>
                </select>
                <textarea id="truckKom" placeholder="Kommentar..."></textarea>
                <button type="button" class="add-btn" onclick="addItem('truck'); vibrate(30);">✚ Lägg till i listan</button>
                <div id="truckList" class="list-container hidden"></div>
            </div>
        </div>

        <div class="card" id="card-maskin">
            <div class="error-msg">⚠︎ Du har valt NOK – Lägg till minst en maskin i listan!</div>
            <label>Maskiner & Verktyg</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-maskin-ok" onclick="setSegment('maskin', 'OK'); vibrate(30);">OK</button>
                <button type="button" class="segment-btn" id="btn-maskin-nok" onclick="setSegment('maskin', 'Felanmälan (NOK)'); vibrate(30);">Felanmälan (NOK)</button>
            </div>
            <input type="hidden" id="maskin" value="OK" class="save-data">
            <div id="maskinContainer" class="hidden">
                <div class="machine-grid">
                    <div class="machine-item" onclick="selectMachine('Ergopack', this); vibrate(30);"><div class="machine-circle"><img src="ergopack.png"></div><div class="machine-label">Ergopack</div></div>
                    <div class="machine-item" onclick="selectMachine('Bandmaskin', this); vibrate(30);"><div class="machine-circle"><img src="bandning.png"></div><div class="machine-label">Bandmaskin</div></div>
                    <div class="machine-item" onclick="selectMachine('Movexx', this); vibrate(30);"><div class="machine-circle"><img src="Movexx.png"></div><div class="machine-label">Movexx</div></div>
                    <div class="machine-item" onclick="selectMachine('Pallyftare', this); vibrate(30);"><div class="machine-circle"><img src="pallyft.png"></div><div class="machine-label">Pallyftare</div></div>
                </div>
                <div id="machineSubIdContainer" class="hidden">
                    <select id="machineSubId"><option value="">-- Välj ID --</option></select>
                </div>
                <input type="hidden" id="selectedMachineName" value="">
                <select id="machineFel"><option value="">-- Feltyp --</option><option>Mekaniskt</option><option>Elektriskt</option><option>Annat</option></select>
                <textarea id="machineKom" placeholder="Kommentar..."></textarea>
                <button type="button" class="add-btn" onclick="addItem('maskin'); vibrate(30);">✚ Lägg till i listan</button>
                <div id="maskinList" class="list-container hidden"></div>
            </div>
        </div>

        <div class="card">
            <label>Tillsyn & Rengöring</label>
            <label style="font-weight: normal; font-size: 0.8em;">Daglig tillsyn truckar</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-tillsyn-ok" onclick="setSegment('tillsyn', 'OK'); vibrate(30);">OK</button>
                <button type="button" class="segment-btn" id="btn-tillsyn-nok" onclick="setSegment('tillsyn', 'NOK'); vibrate(30);">NOK</button>
            </div>
            <input type="hidden" id="tillsyn" value="OK" class="save-data">
            <div id="tillsynBox" class="hidden"><textarea id="tillsynfel" placeholder="Orsak?" class="save-data"></textarea></div>

            <label style="font-weight: normal; font-size: 0.8em;">Rengöring Bandningsmaskiner</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-rengoring-ok" onclick="setSegment('rengoring', 'OK'); vibrate(30);">OK</button>
                <button type="button" class="segment-btn" id="btn-rengoring-nok" onclick="setSegment('rengoring', 'Ej utfört'); vibrate(30);">Ej utfört</button>
            </div>
            <input type="hidden" id="rengoring" value="OK" class="save-data">
            <div id="rengoringBox" class="hidden"><textarea id="rengoringKommentar" placeholder="Orsak?" class="save-data"></textarea></div>
        </div>

        <div class="card">
            <label>Driftinformation & Avvikelser</label>
            <textarea id="drift" placeholder="Information..." class="save-data"></textarea>
            <textarea id="avvikelse" placeholder="Avvikelser..." class="save-data"></textarea>
            <textarea id="atgard" placeholder="Åtgärder..." class="save-data"></textarea>
        </div>

        <div class="button-group" style="display: flex; gap: 10px;">
            <button type="button" class="secondary" onclick="clearForm(); vibrate(40);" style="flex:1;">Rensa</button>
            <button type="submit" id="submitBtn" class="primary" style="flex:2;" onclick="vibrate(60);">Skicka Rapport</button>
        </div>
    </form>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <button class="danger" style="margin-bottom: 10px;" onclick="closeStats(); vibrate(30);">Stäng</button>
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRw6n_3d87vAX6DVNmEZ-JwkOYDQcB1scVLhghcY6Cxam8Oq9VEvz1xhMvF89KOsGGJWZFxdNhCE5lZ/pubhtml?widget=true&amp;headers=false" width="100%" height="100%" style="border:none;"></iframe>
    </div>
</div>

<script>
let truckArray = []; 
let maskinArray = [];
const machineIds = {
    'Ergopack': ['Ergopack 1', 'Ergopack 2', 'Ergopack 3', 'Ergopack 4', 'Ergopack 5'],
    'Bandmaskin': ['Bandmaskin 1', 'Bandmaskin 2', 'Bandmaskin 3', 'Bandmaskin 4', 'Bandmaskin 5', 'Bandmaskin 6', 'Bandmaskin 7'],
    'Movexx': ['Movexx 1', 'Movexx 2', 'Movexx 3', 'Movexx 4'],
    'Pallyftare': ['Pallyftare 1', 'Pallyftare 2', 'Pallyftare 3', 'Pallyftare 4', 'Pallyftare 5', 'Pallyftare 6', 'Pallyftare 7', 'Pallyftare 8', 'Pallyftare 9', 'Pallyftare 10']
};

function vibrate(ms = 40) { if ('vibrate' in navigator) navigator.vibrate(ms); }

async function loadSavedData() {
    const keys = ['signatur', 'datum', 'avdelning', 'truck', 'tillsyn', 'tillsynfel', 'rengoring', 'rengoringKommentar', 'drift', 'avvikelse', 'atgard'];
    for (const key of keys) {
        const val = await idbKeyval.get('draft_' + key);
        if (val !== undefined) {
            const el = document.getElementById(key);
            if (el) { el.value = val; if (el.type === 'hidden') setSegment(key, val, false); }
        }
    }
    const savedTrucks = await idbKeyval.get('draft_truckArray');
    if (savedTrucks) { truckArray = savedTrucks; renderList('truck'); }
    const savedMaskiner = await idbKeyval.get('draft_maskinArray');
    if (savedMaskiner) { maskinArray = savedMaskiner; renderList('maskin'); }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
}

window.onload = async function() {
    await loadSavedData();
    const today = new Date().toISOString().split('T')[0];
    if (!document.getElementById('datum').value) document.getElementById('datum').value = today;
};

document.addEventListener('input', async (e) => { 
    if (e.target.classList.contains('save-data')) await idbKeyval.set('draft_' + e.target.id, e.target.value);
});

function toggleDarkMode() {
    const isChecked = document.getElementById('darkmodeToggle').checked;
    document.body.classList.toggle('dark-mode', isChecked);
    localStorage.setItem('theme', isChecked ? 'dark' : 'light');
}

function toggleLargeText() {
    const isChecked = document.getElementById('largeTextToggle').checked;
    document.body.classList.toggle('large-text', isChecked);
}

async function setSegment(type, val, save = true) {
    const inputEl = document.getElementById(type);
    if(!inputEl) return;
    inputEl.value = val;
    if(save) await idbKeyval.set('draft_' + type, val);
    const okBtn = document.getElementById(`btn-${type}-ok`); 
    const nokBtn = document.getElementById(`btn-${type}-nok`);
    const box = document.getElementById(type + (type==='truck'||type==='maskin'?'Container':(type==='tillsyn'||type==='rengoring'?'Box':'')));
    if (val === 'OK') { okBtn?.classList.add('active'); nokBtn?.classList.remove('active', 'nok'); box?.classList.add('hidden'); } 
    else { nokBtn?.classList.add('active', 'nok'); okBtn?.classList.remove('active'); box?.classList.remove('hidden'); }
}

function selectMachine(name, element) {
    document.querySelectorAll('.machine-item').forEach(item => item.classList.remove('active'));
    element.classList.add('active');
    document.getElementById('selectedMachineName').value = name;
    const subSelect = document.getElementById('machineSubId');
    subSelect.innerHTML = '<option value="">-- Välj ID --</option>';
    if (machineIds[name]) {
        machineIds[name].forEach(id => { const opt = document.createElement('option'); opt.value = id; opt.textContent = id; subSelect.appendChild(opt); });
        document.getElementById('machineSubIdContainer').classList.remove('hidden');
    }
}

async function addItem(type) {
    if(type==='truck') {
        const id = document.getElementById('truckId'), fel = document.getElementById('truckFel'), kom = document.getElementById('truckKom');
        if (!id.value || !fel.value) return alert("Fyll i fält!");
        truckArray.push({ id: id.value, fel: fel.value, kom: kom.value });
        await idbKeyval.set('draft_truckArray', truckArray);
    } else {
        const name = document.getElementById('selectedMachineName').value, subId = document.getElementById('machineSubId').value, fel = document.getElementById('machineFel').value, kom = document.getElementById('machineKom').value;
        if (!name || !fel) return alert("Fyll i fält!");
        maskinArray.push({ id: subId || name, fel: fel, kom: kom });
        await idbKeyval.set('draft_maskinArray', maskinArray);
    }
    renderList(type);
}

function renderList(type) {
    const div = document.getElementById(type + 'List'), arr = (type==='truck'?truckArray:maskinArray);
    div.innerHTML = arr.map((t, i) => `<div class="list-item"><span>${t.id}: ${t.fel}</span><button type="button" class="danger" onclick="removeItem('${type}', ${i})">X</button></div>`).join('');
    div.classList.toggle('hidden', arr.length === 0);
}

async function removeItem(type, idx) {
    if(type==='truck') truckArray.splice(idx, 1); else maskinArray.splice(idx, 1);
    await idbKeyval.set('draft_'+type+'Array', (type==='truck'?truckArray:maskinArray));
    renderList(type);
}

function getSkift() { const h = new Date().getHours(); return (h >= 6 && h < 14) ? "Dagskift" : (h >= 14 && h < 22) ? "Kvällsskift" : "Nattskift"; }

async function clearForm() { if(confirm("Rensa?")) { await idbKeyval.clear(); location.reload(); } }
function openStats(){ document.getElementById("statsModal").style.display = "flex"; }
function closeStats(){ document.getElementById("statsModal").style.display = "none"; }

document.getElementById('reportForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "Skickar...";

    const data = {
        signatur: document.getElementById('signatur').value,
        datum: document.getElementById('datum').value,
        avdelning: document.getElementById('avdelning').value,
        skift: getSkift(),
        truckar: truckArray,
        maskiner: maskinArray,
        tillsyn: document.getElementById('tillsyn').value,
        tillsyn_kom: document.getElementById('tillsynfel').value,
        rengoring: document.getElementById('rengoring').value,
        rengoring_kom: document.getElementById('rengoringKommentar').value,
        drift: document.getElementById('drift').value,
        avvikelse: document.getElementById('avvikelse').value,
        atgard: document.getElementById('atgard').value
    };

    try {
        // 1. Skicka till Google/Teams
        await fetch("https://script.google.com/macros/s/AKfycbyYP5MaG_8ntQy0ZOYGv1HGZJSKG8Ru8iibJRkUZiIC2pnltNSth4nwQ0MNMXd63edA/exec", {
            method: "POST", mode: "no-cors", body: JSON.stringify(data)
        });

        // 2. Förbered och öppna e-post (Din kod!)
        let mailBody = `SKIFTRAPPORT\nNamn: ${data.signatur}\nSkift: ${data.skift}\n\nTRUCKAR:\n`;
        truckArray.forEach(t => mailBody += `- ${t.id}: ${t.fel}\n`);
        
        const mail = ["rapport.vovlo@samhall.se", "volvooc@samhall.onmicrosoft.com"].join(navigator.userAgent.toLowerCase().includes("windows")?";":",");
        
        // Öppna mejlet
        window.location.href = `mailto:${mail}?subject=Skiftrapport&body=${encodeURIComponent(mailBody)}`;

        // 3. Rensa och nollställ efter en kort fördröjning
        setTimeout(async () => {
            alert("Rapport skickad till kalkylark & e-post!");
            await idbKeyval.clear();
            location.reload();
        }, 1000);

    } catch (err) {
        alert("Fel vid sändning.");
        btn.disabled = false; btn.innerText = "Skicka Rapport";
    }
});
</script>
