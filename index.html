<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Skyddad Sida</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <style>
            /* --- HELA SIDANS BAKGRUND --- */
            body, html {
                height: 100%;
                margin: 0;
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                background-color: #f0f2f5;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* --- KONTAINER FÖR FORMULÄRET --- */
            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 20px;
                box-sizing: border-box;
            }

            .staticrypt-form {
                background: #ffffff;
                border-radius: 12px;
                padding: 40px;
                text-align: center;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            }

            .staticrypt-title {
                font-size: 24px;
                font-weight: 600;
                color: #1c1e21;
                margin-bottom: 20px;
            }

            .staticrypt-hr {
                margin: 20px 0;
                border: 0;
                border-top: 1px solid #eee;
            }

            /* --- INPUT-FÄLTET OCH ÖGAT --- */
            .staticrypt-password-container {
                position: relative;
                margin-bottom: 15px;
            }

            .staticrypt-form input[type="password"], 
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 14px 45px 14px 16px;
                border: 1px solid #dddfe2;
                border-radius: 8px;
                font-size: 16px;
                box-sizing: border-box;
                background-color: #f5f6f7;
                outline: none;
                transition: border 0.2s, background-color 0.2s;
            }

            .staticrypt-form input:focus {
                border-color: #5b5fc7;
                background-color: #fff;
            }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                cursor: pointer;
                opacity: 0.5;
                z-index: 10;
            }

            /* --- KNAPPEN --- */
            .staticrypt-decrypt-button {
                width: 100%;
                padding: 14px;
                background-color: #5b5fc7;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: filter 0.2s;
            }

            .staticrypt-decrypt-button:hover {
                filter: brightness(90%);
            }

            /* --- KOM IHÅG MIG --- */
            .staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
                font-size: 14px;
                color: #606770;
                cursor: pointer;
            }

            .staticrypt-remember input {
                margin-right: 8px;
            }

            /* --- ÖVRIGT --- */
            .hidden { display: none !important; }
            
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                width: 40px;
                height: 40px;
                border: 4px solid #f3f3f3;
                border-top: 4px solid #5b5fc7;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
    </head>

                        stringify: b => Array.from(b).map(x => x.toString(16).padStart(2, "0")).join("")
                    };

                        parse: s => new TextEncoder().encode(s),
                        stringify: b => new TextDecoder().decode(b)
                    };
                    exports.hashPassword = async (p, s) => {
                        let h = await pbkdf2(p, s, 1000, "SHA-1");
                        h = await pbkdf2(h, s, 14000, "SHA-256");
                        return pbkdf2(h, s, 585000, "SHA-256");
                    };

                        const b = await subtle.deriveBits({ name: "PBKDF2", hash: a, iterations: i, salt: UTF8Encoder.parse(s) }, k, 256);
                        return HexEncoder.stringify(new Uint8Array(b));
                    }

                        const iv = HexEncoder.parse(m.substring(0, 32)), e = HexEncoder.parse(m.substring(32));
                        const k = await subtle.importKey("raw", HexEncoder.parse(h), ENCRYPTION_ALGO, false, ["decrypt"]);
                        return UTF8Encoder.stringify(new Uint8Array(await subtle.decrypt({ name: ENCRYPTION_ALGO, iv }, k, e)));
                    };
                    exports.signMessage = async (h, m) => {
                        const k = await subtle.importKey("raw", HexEncoder.parse(h), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
                        return HexEncoder.stringify(new Uint8Array(await subtle.sign("HMAC", k, UTF8Encoder.parse(m))));
                    };

                })();

                exports.init = (sConfig, tConfig) => {

                            if (h) {
                                const r = await cryptoEngine.decrypt(sConfig.staticryptEncryptedMsgUniqueVariableName.substring(64), h);
                                document.write(r); document.close(); return { isSuccessful: true };
                            }
                            return { isSuccessful: false };
                        },
                        handleDecryptionOfPage: async (p, r) => {
                            const h = await cryptoEngine.hashPassword(p, sConfig.staticryptSaltUniqueVariableName);
                            const sig = sConfig.staticryptEncryptedMsgUniqueVariableName.substring(0, 64);
                            const msg = sConfig.staticryptEncryptedMsgUniqueVariableName.substring(64);
                            if (await cryptoEngine.signMessage(h, msg) === sig) {
                                if (r) localStorage.setItem(tConfig.rememberPassphraseKey, h);
                                const dec = await cryptoEngine.decrypt(msg, h);
                                document.write(dec); document.close();
                                return { isSuccessful: true };
                            }
                            return { isSuccessful: false };
                        }
                    };
                };
                return exports;
            })();
