<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>
<style>
body{font-family:Arial;margin:15px;max-width:600px;}
label{display:block;margin-top:12px;font-weight:bold;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;}
button{width:100%;padding:15px;margin-top:15px;background:#2a4d69;color:white;border:none;border-radius:6px;}
button.clearBtn{background:#888;}
.hidden{display:none;}
.truckBox{border:1px solid #ccc;padding:10px;margin-top:10px;border-radius:6px;}
.truckListConfirmed{margin-top:10px;background:#eef3f7;padding:10px;border-radius:6px;}
.removeBtn{background:red;margin-top:5px;}
</style>
</head>
<body>

<h2>📋 Skiftrapport</h2>

<form id="form">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj Avdelning</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus" onchange="toggleTruck()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckContainer" class="hidden">
<div id="truckFields"></div>
<div id="truckConfirmed" class="truckListConfirmed"></div>
<button type="button" id="addTruckBtn" onclick="addTruck()" disabled>+ Lägg till avvikelse</button>
</div>

<label>Daglig tillsyn truckar</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="tillsynBox" class="hidden">
<textarea id="tillsynfel"></textarea>
</div>

<label>Maskiner & Verktyg</label>
<select id="maskin" onchange="toggleField('maskin','maskinBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="maskinBox" class="hidden">
<textarea id="maskinfel"></textarea>
</div>

<label>Rengöring av Bandningsmaskiner</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="rengoringBox" class="hidden">
<textarea id="rengoringKommentar"></textarea>
</div>

<label>Övriga driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

  <label>Daglig tillsyn truckar</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynOrsak','Skriv orsaken till varför daglig tillsyn är NOK...')">
  <option>OK</option>
  <option>NOK</option>
</select>
<div id="tillsynOrsak" class="hidden">
  <label>Orsak</label>
  <textarea id="tillsynfel"></textarea>
</div>

<label>Status maskin och verktyg</label>
<select id="maskin" onchange="toggleField('maskin','maskinOrsak','Skriv orsaken till varför maskin/verktyg är NOK...')">
  <option>OK</option>
  <option>NOK</option>
</select>
<div id="maskinOrsak" class="hidden">
  <label>Orsak</label>
  <textarea id="maskinfel"></textarea>
</div>

<label>Rengöring bandningsmaskiner</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringOrsak','Skriv kommentar om rengöring...')">
  <option>OK</option>
  <option>NOK</option>
</select>
<div id="rengoringOrsak" class="hidden">
  <label>Kommentar</label>
  <textarea id="rengoringKommentar"></textarea>
</div>

<button type="submit">Skicka</button>
<button type="button" class="clearBtn" onclick="clearForm()">Börja om</button>
</form>

<script>
datum.valueAsDate=new Date();

  function toggleField(selectId, fieldId, placeholderText){
    const selectEl = document.getElementById(selectId);
    const field = document.getElementById(fieldId);
    const textarea = field.querySelector('textarea') || field; // fallback

    if(selectEl.value === "NOK"){
        field.style.display = "block";
        textarea.placeholder = placeholderText; // sätt placeholder
    } else {
        field.style.display = "none";
        textarea.placeholder = ""; // ta bort placeholder när OK
    }
}

let truckArray=[];

function getSkift(){
  let now=new Date();
  let min = now.getHours()*60 + now.getMinutes();
  if(min>=350 && min<=480) return "Nattskift";
  if(min>=840 && min<=1020) return "Dagskift";
  if(min>=1320 || min<=120) return "Kvällsskift";
  return "Okänt skift";
}

function toggleField(sel, box){
  document.getElementById(box).style.display=
    document.getElementById(sel).value==="NOK"?"block":"none";
}

function toggleTruck(){
  if(truckstatus.value==="NOK"){
    truckContainer.style.display="block";
    if(truckFields.childElementCount===0) createTruckInput();
  }else{
    truckContainer.style.display="none";
    truckFields.innerHTML="";
    truckConfirmed.innerHTML="";
    truckArray=[];
  }
}

// Skapar fälten för truck avvikelse
function createTruckInput(){
  truckFields.innerHTML=`
    <select id="truckId">
      <option value="">Välj Truck</option>
      <option>TVS-01</option>
      <option>TVS-02</option>
      <option>TPB-01</option>
      <option>TPB-02</option>
    </select>
    <select id="truckFel">
      <option value="">Välj Feltyp</option>
      <option>Hydraulik/Olja</option>
      <option>Chassi</option>
      <option>Stativ</option>
      <option>Batteri</option>
      <option>Drag</option>
      <option>Däck</option>
      <option>Linde Connect</option>
      <option>Övrigt</option>
    </select>
    <textarea id="truckKom" placeholder="Lägg en beskrivning på felet"></textarea>
    <button type="button" onclick="confirmTruck()">Bekräfta avvikelse</button>
  `;
}

function confirmTruck(){
  let id=document.getElementById("truckId").value;
  let fel=document.getElementById("truckFel").value;
  let kom=document.getElementById("truckKom").value;
  if(!id || !fel){alert("Fyll i truck ID och feltyp"); return;}
  truckArray.push({id,fel,kom});
  // Visa i lista under
  renderConfirmedTrucks();
  // Rensa input
  document.getElementById("truckId").value="";
  document.getElementById("truckFel").value="";
  document.getElementById("truckKom").value="";
}

function renderConfirmedTrucks(){
  let html="";
  truckArray.forEach((t,i)=>{
    html+=`${i+1}. ${t.id} (${t.fel})`;
    if(t.kom) html+=` - ${t.kom}`;
    html+="<br>";
  });
  truckConfirmed.innerHTML=html;
}

function validate(){
  if(avdelning.value===""){alert("Välj avdelning");return false;}
  if(truckstatus.value==="NOK" && truckArray.length===0){alert("Lägg till minst en truckavvikelse"); return false;}
  if(tillsyn.value==="NOK" && tillsynfel.value===""){alert("Fyll i Daglig tillsyn orsak"); return false;}
  if(maskin.value==="NOK" && maskinfel.value===""){alert("Fyll i vilken Maskin/verktyg samt orsak"); return false;}
  if(rengoring.value==="NOK" && rengoringKommentar.value===""){alert("Fyll i varför bandnigsmaskiner är ej rengjorda"); return false;}
  return true;
}

form.addEventListener("submit",function(e){
  e.preventDefault();
  if(!validate()) return;

  let body="";
  body+="Datum: "+datum.value+"\n\n";
  body+="Avdelning: "+avdelning.value+"\n\n";
  body+="Truckstatus: "+truckstatus.value+"\n";
  truckArray.forEach(t=>{
    body+="- "+t.id+" ("+t.fel+")\n";
    if(t.kom) body+="  Kommentar: "+t.kom+"\n";
  });
  body+="\nDaglig tillsyn: "+tillsyn.value+"\n";
  if(tillsyn.value==="NOK") body+=tillsynfel.value+"\n\n";
  body+="Maskin: "+maskin.value+"\n";
  if(maskin.value==="NOK") body+=maskinfel.value+"\n\n";
  body+="Rengöring: "+rengoring.value+"\n";
  if(rengoring.value==="NOK") body+=rengoringKommentar.value+"\n\n";
  body+="Driftstörningar:\n"+drift.value+"\n\n";
  body+="Avvikelse:\n"+avvikelse.value+"\n\n";
  body+="Åtgärd:\n"+atgard.value;

  // Skicka till Google Sheets
  fetch("https://script.google.com/macros/s/AKfycbzZ0tuEEi1750vcvlI-pjbjQABdSDC5-nuBZAwD_IrHkmrd9_3P4Aknv9Vui2v6wVtwDg/exec",{
    method:"POST",
    body:JSON.stringify({
      datum:datum.value,
      avdelning:avdelning.value,
      truckstatus:truckstatus.value,
      truckar:truckArray,
      tillsyn:tillsyn.value,
      tillsynfel:tillsynfel.value,
      maskin:maskin.value,
      maskinfel:maskinfel.value,
      rengoring:rengoring.value,
      rengoringKommentar:rengoringKommentar.value,
      drift:drift.value,
      avvikelse:avvikelse.value,
      atgard:atgard.value
    })
  });

  // Skicka mail
  let subject="Skiftrapport "+datum.value+" - "+getSkift();
  let emails="rapport.vovlo@samhall.se,volvooc@samhall.onmicrosoft.com";
  window.location.href="mailto:"+emails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

  // Rensa formulär efter skick
  clearForm();
});

function clearForm(){
  form.reset();
  truckArray=[];
  truckFields.innerHTML="";
  truckConfirmed.innerHTML="";
  truckContainer.style.display="none";
  datum.valueAsDate=new Date();
}
</script>

</body>
</html>
