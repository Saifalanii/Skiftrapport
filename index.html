<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>

<style>
body{font-family:Arial;margin:15px;max-width:600px;}
label{display:block;margin-top:12px;font-weight:bold;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;}
button{width:100%;padding:15px;margin-top:15px;background:#2a4d69;color:white;border:none;border-radius:6px;}
.hidden{display:none;}
.error{border:2px solid red;background:#ffe6e6;}
.truckBox{border:1px solid #ccc;padding:10px;margin-top:10px;border-radius:6px;}
.removeBtn{background:red;margin-top:5px;}
</style>
</head>
<body>

<h2>📋 Skiftrapport</h2>

<form id="form">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus" onchange="toggleTruck()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckContainer" class="hidden">
<div id="truckList"></div>
<button type="button" onclick="addTruck()">+ Lägg till truck</button>
</div>

<label>Daglig tillsyn</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="tillsynBox" class="hidden">
<textarea id="tillsynfel"></textarea>
</div>

<label>Maskin</label>
<select id="maskin" onchange="toggleField('maskin','maskinBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="maskinBox" class="hidden">
<textarea id="maskinfel"></textarea>
</div>

<label>Rengöring</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="rengoringBox" class="hidden">
<textarea id="rengoringKommentar"></textarea>
</div>

<label>Driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="submit">Skicka</button>

</form>

<script>

// ===== DATUM =====
datum.valueAsDate = new Date();

// ===== VISA/GÖM =====
function toggleField(sel, box){
document.getElementById(box).style.display =
document.getElementById(sel).value==="NOK" ? "block":"none";
}

// ===== TRUCK =====
function toggleTruck(){
truckContainer.style.display =
truckstatus.value==="NOK" ? "block":"none";
}

// ===== LÄGG TILL TRUCK =====
function addTruck(){
let div = document.createElement("div");
div.className="truckBox";

div.innerHTML = `
<select class="truckid">
<option value="">Truck ID</option>
<option>TVS-01</option>
<option>TVS-02</option>
<option>TPB-01</option>
<option>TPB-02</option>
</select>

<select class="feltyp">
<option value="">Feltyp</option>
<option>Hydraulik/Olja</option>
<option>Chassi</option>
<option>Stativ</option>
<option>Batteri</option>
<option>Drag</option>
<option>Däck</option>
<option>Linde Connect</option>
<option>Övrigt</option>
</select>

<textarea class="kommentar" placeholder="Kommentar"></textarea>

<button type="button" class="removeBtn" onclick="this.parentElement.remove()">Ta bort</button>
`;

truckList.appendChild(div);
}

// ===== VALIDERING =====
function validate(){

if(avdelning.value===""){
alert("Välj avdelning");
return false;
}

if(truckstatus.value==="NOK"){

let trucks = document.querySelectorAll(".truckBox");

if(trucks.length===0){
alert("Lägg till minst en truck");
return false;
}

let valid=false;

trucks.forEach(t=>{
let id = t.querySelector(".truckid").value;
let fel = t.querySelector(".feltyp").value;

if(id && fel) valid=true;
});

if(!valid){
alert("Fyll i minst en truck korrekt");
return false;
}
}

return true;
}

// ===== SKICKA =====
form.addEventListener("submit", function(e){
e.preventDefault();
if(!validate()) return;

// samla truckar
let truckArray = [];

document.querySelectorAll(".truckBox").forEach(t=>{
let id = t.querySelector(".truckid").value;
let fel = t.querySelector(".feltyp").value;
let kom = t.querySelector(".kommentar").value;

if(id && fel){
truckArray.push({
truckId: id,
feltyp: fel,
kommentar: kom
});
}
});

// ===== SEND TO GOOGLE SHEETS =====
fetch("https://script.google.com/macros/s/AKfycbxIdJRBJc1PL_qcTzPsmlqx7iASFu3wbIcewKHdsQLAjYLBjjihGZmqGm-fVcjsNAo4sQ/exec",{
method:"POST",
body:JSON.stringify({
datum: datum.value,
avdelning: avdelning.value,
truckstatus: truckstatus.value,
tillsyn: tillsyn.value,
tillsynfel: tillsynfel.value,
maskin: maskin.value,
maskinfel: maskinfel.value,
rengoring: rengoring.value,
rengoringKommentar: rengoringKommentar.value,
drift: drift.value,
avvikelse: avvikelse.value,
atgard: atgard.value,
truckar: truckArray
})
});

// ===== MAIL =====
let body="";

truckArray.forEach(t=>{
body += t.truckId+" - "+t.feltyp+"\n";
if(t.kommentar) body += t.kommentar+"\n";
body+="\n";
});

let emails="rapport.vovlo@samhall.se,volvooc@samhall.onmicrosoft.com";

window.location.href =
"mailto:"+emails+"?subject=Skiftrapport&body="+encodeURIComponent(body);

alert("Skickat!");
});

</script>
</body>
</html>
