<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>

<!-- IKONER -->
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
.container{max-width:600px;margin:auto;padding:15px;}
h2{text-align:center;}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08);margin-bottom:15px;}

label{display:block;margin-top:12px;font-weight:bold;}

#datum{width:60%;}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{min-height:80px;resize:vertical;}

button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.primary{background:#2a4d69;color:white;}
.secondary{background:#888;color:white;}
.danger{background:#c0392b;color:white;}

.hidden{display:none;}
.truckListConfirmed{margin-top:10px;background:#eef3f7;padding:10px;border-radius:6px;}
.error{border:2px solid red !important;background:#ffe6e6;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000;}
.modalContent{background:white;width:90%;max-width:700px;border-radius:12px;padding:10px;}
</style>
</head>

<body>

<div class="container">
<h2>📋 Skiftrapport</h2>
<button class="primary" onclick="openStats()">📊 Visa statistik</button>

<form id="form" class="card">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus" onchange="toggleTruck()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckContainer" class="hidden">
<div id="truckFields"></div>
<div id="truckConfirmed" class="truckListConfirmed"></div>
</div>

<label>Daglig tillsyn truckar</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="tillsynBox" class="hidden">
<textarea id="tillsynfel" placeholder="Orsak"></textarea>
</div>

<label>Maskiner & Verktyg</label>
<select id="maskin" onchange="toggleField('maskin','maskinBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="maskinBox" class="hidden">
<textarea id="maskinfel" placeholder="Orsak"></textarea>
</div>

<label>Rengöring av Bandningsmaskiner</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="rengoringBox" class="hidden">
<textarea id="rengoringKommentar" placeholder="Orsak"></textarea>
</div>

<label>Övriga driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="submit" class="primary">Skicka</button>
<button type="button" class="secondary" onclick="clearForm()">Börja om</button>

</form>
</div>

<div id="statsModal" class="modal">
  <div class="modalContent">
    <button class="danger" onclick="closeStats()">Stäng</button>
    <iframe id="statsFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQY0jbcHllFP-BC4h08x-mU28_9QuPBKOhcB4ue4HFUV8G7daNOsfoTUbAfDnMKmKm2-2T2NDLGDZIW/pubhtml?gid=1458081070&single=true&widget=true&headers=false" width="100%" height="500"></iframe>
  </div>
</div>

<script>

datum.valueAsDate=new Date();
let truckArray=[];

function openStats(){
  let frame = document.getElementById("statsFrame");
  frame.src = frame.src.split("&t=")[0] + "&t=" + new Date().getTime(); // cache fix
  document.getElementById("statsModal").style.display="flex";
}

function closeStats(){document.getElementById("statsModal").style.display="none";}

function getSkift(){
  let now=new Date();
  let min=now.getHours()*60+now.getMinutes();
  if(min>=350&&min<=480)return"Nattskift";
  if(min>=840&&min<=1020)return"Dagskift";
  if(min>=1320||min<=120)return"Kvällsskift";
  return"Okänt";
}

function toggleField(sel,box){
  document.getElementById(box).style.display=
  document.getElementById(sel).value==="NOK"?"block":"none";
}

function toggleTruck(){
  if(truckstatus.value==="NOK"){
    truckContainer.style.display="block";
    if(truckFields.childElementCount===0) createTruckInput();
  }else{
    truckContainer.style.display="none";
    truckFields.innerHTML="";
    truckConfirmed.innerHTML="";
    truckArray=[];
  }
}

function createTruckInput(){
  truckFields.innerHTML=`
    <select id="truckId">
      <option value="">Välj Truck</option>
      <option>TVS-01</option>
      <option>TVS-02</option>
      <option>TPB-01</option>
      <option>TPB-02</option>
    </select>
    <select id="truckFel">
      <option value="">Välj Feltyp</option>
      <option>Hydraulik/Olja</option>
      <option>Chassi</option>
      <option>Stativ</option>
      <option>Batteri</option>
      <option>Drag</option>
      <option>Däck</option>
      <option>Linde Connect</option>
      <option>Övrigt</option>
    </select>
    <textarea id="truckKom" placeholder="Orsak"></textarea>
    <button type="button" onclick="confirmTruck()">Bekräfta</button>
  `;
}

function confirmTruck(){
  let id=truckId.value;
  let fel=truckFel.value;
  let kom=truckKom.value;

  if(!id||!fel){
    if(!id) truckId.classList.add("error"); else truckId.classList.remove("error");
    if(!fel) truckFel.classList.add("error"); else truckFel.classList.remove("error");
    return;
  }

  truckId.classList.remove("error");
  truckFel.classList.remove("error");

  truckArray.push({id,fel,kom});
  renderConfirmedTrucks();

  truckId.value="";
  truckFel.value="";
  truckKom.value="";
}

function renderConfirmedTrucks(){
  let html="";
  truckArray.forEach((t,i)=>{
    html+=`${i+1}. ${t.id} (${t.fel})`;
    if(t.kom) html+=` - ${t.kom}`;
    html+="<br>";
  });
  truckConfirmed.innerHTML=html;
}

function validate(){
  document.querySelectorAll("input,select,textarea").forEach(el=>el.classList.remove("error"));

  let valid=true;

  if(avdelning.value===""){avdelning.classList.add("error"); valid=false;}

  if(truckstatus.value==="NOK" && truckArray.length===0){truckstatus.classList.add("error"); valid=false;}

  if(tillsyn.value==="NOK" && tillsynfel.value===""){tillsynfel.classList.add("error"); valid=false;}

  if(maskin.value==="NOK" && maskinfel.value===""){maskinfel.classList.add("error"); valid=false;}

  if(rengoring.value==="NOK" && rengoringKommentar.value===""){rengoringKommentar.classList.add("error"); valid=false;}

  return valid;
}

form.addEventListener("submit",function(e){
  e.preventDefault();
  if(!validate()) return;

  let body="";
  body+="Datum: "+datum.value+"\n\n";
  body+="Avdelning: "+avdelning.value+"\n\n";

  body+="Truckstatus: "+truckstatus.value+"\n";
  truckArray.forEach(t=>{
    body+="- "+t.id+" ("+t.fel+")\n";
    if(t.kom) body+="  Orsak: "+t.kom+"\n";
  });

  body+="\nDaglig tillsyn: "+tillsyn.value+"\n";
  if(tillsyn.value==="NOK") body+="Orsak: "+tillsynfel.value+"\n";

  body+="\nMaskiner: "+maskin.value+"\n";
  if(maskin.value==="NOK") body+="Orsak: "+maskinfel.value+"\n";

  body+="\nRengöring: "+rengoring.value+"\n";
  if(rengoring.value==="NOK") body+="Orsak: "+rengoringKommentar.value+"\n";

  body+="\nDriftstörningar:\n"+drift.value+"\n";
  body+="\nAvvikelse:\n"+avvikelse.value+"\n";
  body+="\nÅtgärd:\n"+atgard.value;

  fetch("https://script.google.com/macros/s/AKfycbzZ0tuEEi1750vcvlI-pjbjQABdSDC5-nuBZAwD_IrHkmrd9_3P4Aknv9Vui2v6wVtwDg/exec",{
    method:"POST",
    body:JSON.stringify({
      datum:datum.value,
      avdelning:avdelning.value,
      truckstatus:truckstatus.value,
      truckar:truckArray,
      tillsyn:tillsyn.value,
      tillsynfel:tillsynfel.value,
      maskin:maskin.value,
      maskinfel:maskinfel.value,
      rengoring:rengoring.value,
      rengoringKommentar:rengoringKommentar.value,
      drift:drift.value,
      avvikelse:avvikelse.value,
      atgard:atgard.value
    })
  });

  let subject="Skiftrapport "+datum.value+" - "+getSkift();

  
  let emails="rapport.vovlo@samhall.se,volvooc@samhall.onmicrosoft.com";

  window.location.href="mailto:"+emails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

  clearForm();
});

function clearForm(){
  form.reset();
  truckArray=[];
  truckFields.innerHTML="";
  truckConfirmed.innerHTML="";
  truckContainer.style.display="none";
  datum.valueAsDate=new Date();
}

</script>

</body>
</html>
