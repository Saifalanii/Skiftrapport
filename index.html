<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>
<style>
body{font-family: Arial; margin:15px; max-width:600px;}
h1{color:#2a4d69;}
label{display:block; margin-top:12px; font-weight:bold;}
input, select, textarea{width:100%; padding:10px; margin-top:5px; font-size:16px; box-sizing:border-box;}
button{width:100%; padding:15px; margin-top:15px; font-size:18px; background:#2a4d69; color:white; border:none; border-radius:6px;}
button.clearBtn{background:#888;}
.hidden{display:none;}
.error{border:2px solid red; background:#ffe6e6;}
.avvikelseBox{margin-top:10px; padding:10px; background:#f4f4f4; border-radius:6px;}
</style>
</head>
<body>

<h1>📋 Skiftrapport</h1>

<form id="reportForm">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj avdelning</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckAvvikelser"></div>
<button type="button" onclick="addTruckAvvikelse()">Lägg till truckavvikelse</button>

<label>Daglig tillsyn truckar</label>
<select id="tillsyn">
<option>OK</option>
<option>NOK</option>
</select>
<textarea id="tillsynfel" placeholder="Orsak om NOK"></textarea>

<label>Status maskin och verktyg</label>
<select id="maskin">
<option>OK</option>
<option>NOK</option>
</select>
<textarea id="maskinfel" placeholder="Orsak om NOK"></textarea>

<label>Rengöring bandningsmaskiner</label>
<select id="rengoring">
<option>OK</option>
<option>NOK</option>
</select>
<textarea id="rengoringKommentar" placeholder="Kommentar"></textarea>

<label>Övriga driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse - Vad</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="submit">Skicka</button>
<button type="button" class="clearBtn" onclick="clearForm()">Rensa formulär</button>
</form>

<script>
// ===== ELEMENT =====
let datum=document.getElementById("datum");
let avdelning=document.getElementById("avdelning");
let truckstatus=document.getElementById("truckstatus");
let truckAvvikelserDiv=document.getElementById("truckAvvikelser");
let tillsyn=document.getElementById("tillsyn");
let tillsynfel=document.getElementById("tillsynfel");
let maskin=document.getElementById("maskin");
let maskinfel=document.getElementById("maskinfel");
let rengoring=document.getElementById("rengoring");
let rengoringKommentar=document.getElementById("rengoringKommentar");
let drift=document.getElementById("drift");
let avvikelse=document.getElementById("avvikelse");
let atgard=document.getElementById("atgard");

// ===== DATUM =====
datum.valueAsDate=new Date();

// ===== SKIFT =====
function getSkift(){
    let now=new Date();
    let min=now.getHours()*60 + now.getMinutes();
    if(min>=350 && min<=480) return "Nattskift";
    if(min>=840 && min<=1020) return "Dagskift";
    if(min>=1320 || min<=120) return "Kvällsskift";
    return "Okänt skift";
}

// ===== RÖDMARKERING =====
function markError(el, condition){
    if(condition) el.classList.add("error");
    else el.classList.remove("error");
}

// ===== AVVIKELSER TRUCK =====
function addTruckAvvikelse(){
    if(truckstatus.value !== "NOK") return;

    let container=document.createElement("div");
    container.className="avvikelseBox";

    let truckLabel=document.createElement("label");
    truckLabel.textContent="Truck ID";
    container.appendChild(truckLabel);

    let truckSelect=document.createElement("select");
    truckSelect.innerHTML="<option value=''>Välj</option><option>TVS-01</option><option>TVS-02</option><option>TPB-01</option><option>TPB-02</option>";
    container.appendChild(truckSelect);

    let felLabel=document.createElement("label");
    felLabel.textContent="Feltyp";
    container.appendChild(felLabel);

    let felSelect=document.createElement("select");
    felSelect.innerHTML="<option value=''>Välj</option><option>Hydraulik/Olja</option><option>Chassi</option><option>Stativ</option><option>Batteri</option><option>Drag</option><option>Däck</option><option>Linde Connect</option><option>Övrigt</option>";
    container.appendChild(felSelect);

    let kommentarLabel=document.createElement("label");
    kommentarLabel.textContent="Kommentar";
    container.appendChild(kommentarLabel);

    let kommentar=document.createElement("textarea");
    container.appendChild(kommentar);

    truckAvvikelserDiv.appendChild(container);
}

// ===== VALIDERING =====
function validate(){
    let error=false;
    markError(avdelning,avdelning.value==="");
    if(avdelning.value==="") error=true;

    markError(tillsynfel,tillsyn.value==="NOK" && tillsynfel.value.trim()==="");
    if(tillsyn.value==="NOK" && tillsynfel.value.trim()==="") error=true;

    markError(maskinfel,maskin.value==="NOK" && maskinfel.value.trim()==="");
    if(maskin.value==="NOK" && maskinfel.value.trim()==="") error=true;

    if(truckstatus.value==="NOK"){
        let boxes=truckAvvikelserDiv.querySelectorAll(".avvikelseBox");
        boxes.forEach(box=>{
            let truck=box.querySelector("select:nth-of-type(1)");
            let fel=box.querySelector("select:nth-of-type(2)");
            markError(truck,truck.value==="");
            markError(fel,fel.value==="");
            if(truck.value==="" || fel.value==="") error=true;
        });
    }
    return !error;
}

// ===== BYGG DATA FÖR MEJL OCH SHEETS =====
function buildData(){
    let data={};
    data.datum=datum.value;
    data.skift=getSkift();
    data.avdelning=avdelning.value;
    data.truckstatus=truckstatus.value;
    data.truckAvvikelser=[];
    if(truckstatus.value==="NOK"){
        let boxes=truckAvvikelserDiv.querySelectorAll(".avvikelseBox");
        boxes.forEach(box=>{
            data.truckAvvikelser.push({
                truck: box.querySelector("select:nth-of-type(1)").value,
                feltyp: box.querySelector("select:nth-of-type(2)").value,
                kommentar: box.querySelector("textarea").value
            });
        });
    }
    data.tillsyn=tillsyn.value;
    data.tillsynOrsak=tillsynfel.value;
    data.maskin=maskin.value;
    data.maskinOrsak=maskinfel.value;
    data.rengoring=rengoring.value;
    data.rengoringKommentar=rengoringKommentar.value;
    data.drift=drift.value;
    data.avvikelse=avvikelse.value;
    data.atgard=atgard.value;
    return data;
}

// ===== SKICKA =====
document.getElementById("reportForm").addEventListener("submit",function(e){
    e.preventDefault();
    if(!validate()) return;

    let data=buildData();

    // Skicka till Google Sheets via Apps Script
    let url="https://script.google.com/macros/s/AKfycbzZ0tuEEi1750vcvlI-pjbjQABdSDC5-nuBZAwD_IrHkmrd9_3P4Aknv9Vui2v6wVtwDg/exec";
    fetch(url,{
        method:"POST",
        body: JSON.stringify(data)
    }).catch(err=>console.log("Fel vid Sheets:", err));

    // Skicka mejl
    let subject="Skiftrapport "+data.datum+" - "+data.skift;
    let body="Datum: "+data.datum+"\nSkift: "+data.skift+"\nAvdelning: "+data.avdelning+"\nTruckstatus: "+data.truckstatus+"\n";
    if(data.truckAvvikelser.length>0){
        data.truckAvvikelser.forEach(t=>{
            body+="Truck: "+t.truck+", Feltyp: "+t.feltyp;
            if(t.kommentar) body+=", Kommentar: "+t.kommentar;
            body+="\n";
        });
    }
    body+="Daglig tillsyn truckar: "+data.tillsyn+"\n";
    if(data.tillsyn=="NOK") body+="Orsak: "+data.tillsynOrsak+"\n";
    body+="Maskin/verktyg: "+data.maskin+"\n";
    if(data.maskin=="NOK") body+="Orsak: "+data.maskinOrsak+"\n";
    body+="Rengöring bandningsmaskiner: "+data.rengoring+"\n";
    if(data.rengoring=="NOK") body+="Kommentar: "+data.rengoringKommentar+"\n";
    body+="Övriga driftstörningar:\n"+data.drift+"\nAvvikelse:\n"+data.avvikelse+"\nÅtgärd:\n"+data.atgard;

    let emails=["rapport.vovlo@samhall.se","volvooc@samhall.onmicrosoft.com"].join(/android/i.test(navigator.userAgent)?",":";");
    window.location.href="mailto:"+emails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

    clearForm();
});

// ===== RENSNING =====
function clearForm(){
    document.getElementById("reportForm").reset();
    truckAvvikelserDiv.innerHTML="";
    datum.valueAsDate=new Date();
}
</script>
</body>
</html>
