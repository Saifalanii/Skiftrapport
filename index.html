<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skiftrapport v1.1.19</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --teams-purple: #5b5fc7; --teams-bg: #e8eaed; 
            --teams-card: #ffffff; --teams-border: #d1d1d1; --text-main: #242424;
            --text-sec: #616161; --danger: #c0392b; --success: #27ae60;
            --base-font: 16px; --label-font: 0.85rem; --h2-font: 1.3rem;
            --error-glow: 0 0 15px rgba(192, 57, 43, 0.4);
        }
        body.large-text { --base-font: 20px; --label-font: 1.1rem; --h2-font: 1.6rem; }
        body.dark-mode { --teams-bg: #111111; --teams-card: #202020; --teams-border: #444444; --text-main: #ffffff; --text-sec: #adadad; --teams-purple: #7f85f5; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0; background: var(--teams-bg); color: var(--text-main);
            line-height: 1.5; transition: background 0.3s, font-size 0.2s;
            font-size: var(--base-font);
            overscroll-behavior: none; /* Förhindrar pull-to-refresh */
        }
        .container { max-width: 500px; margin: 0 auto; padding: 12px; padding-bottom: 40px; }
        .icon { width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 8px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--teams-card); padding: 10px; border-radius: 8px; border: 1px solid var(--teams-border); }
        .switch-group { display: flex; align-items: center; gap: 8px; }
        .theme-switch { display: inline-block; height: 20px; position: relative; width: 38px; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 2px; content: ""; height: 16px; left: 2px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        h2 { text-align: center; margin: 15px 0; font-size: var(--h2-font); display: flex; align-items: center; justify-content: center; }
        
        .card { 
            background: var(--teams-card); padding: 20px; border-radius: 12px; 
            border: 1px solid var(--teams-border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 20px; transition: transform 0.2s, box-shadow 0.3s, border-color 0.3s;
        }
        .card.error-attention { border-color: var(--danger); box-shadow: var(--error-glow); transform: scale(1.01); }

        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: var(--label-font); }

        input, select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid var(--teams-border); font-size: var(--base-font); 
            background-color: var(--teams-card); color: var(--text-main); outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--teams-purple); }

        .machine-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .machine-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .machine-circle {
            width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--teams-border);
            overflow: hidden; background: #fff; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
            padding: 5px; 
        }
        .machine-circle img { width: 100%; height: 100%; object-fit: contain; } 
        .machine-item.active .machine-circle { border-color: var(--teams-purple); transform: scale(1.08); box-shadow: 0 0 12px rgba(91, 95, 199, 0.4); background: rgba(91, 95, 199, 0.05); }
        .machine-label { font-size: 0.7rem; font-weight: 600; text-align: center; color: var(--text-sec); transition: color 0.2s; }

        .segmented-control { display: flex; background: var(--teams-bg); padding: 4px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--teams-border); }
        .segment-btn { flex: 1; border: none; padding: 10px; background: transparent; color: var(--text-sec); font-weight: 600; font-size: 0.9em; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .segment-btn.active { background: var(--teams-card); color: var(--teams-purple); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .segment-btn.active.nok { color: var(--danger); }

        button { padding: 12px; border: none; border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
        button:active { transform: scale(0.98); }
        .primary { background: var(--teams-purple); color: white; flex: 2; }
        .secondary { background: var(--teams-card); color: var(--text-main); border: 1px solid var(--teams-border); flex: 1; }
        .danger { background: var(--danger); color: white; }
        .add-btn { background: var(--success); color: white; margin-top: 5px; width: 100%; }

        .hidden { display: none; }
        .list-container { margin-top: 10px; background: var(--teams-bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--teams-purple); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--teams-border); font-size: 0.9em; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--teams-card); width: 95%; max-width: 800px; border-radius: 12px; padding: 15px; height: 90vh; display: flex; flex-direction: column; }
        .version-text { text-align: center; font-size: 10px; color: var(--text-sec); margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div class="switch-group">
            <span style="font-size: 11px; font-weight: 600;">Stor text</span>
            <label class="theme-switch"><input type="checkbox" id="largeTextToggle" onclick="toggleLargeText(); vibrate();"><div class="slider"></div></label>
        </div>
        <div class="switch-group">
            <span style="font-size: 11px; font-weight: 600;">Mörkt läge</span>
            <label class="theme-switch"><input type="checkbox" id="darkmodeToggle" onclick="toggleDarkMode(); vibrate();"><div class="slider"></div></label>
        </div>
    </div>

    <h2>
        <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        Skiftrapport
    </h2>

    <button class="secondary" style="width: 100%; margin-bottom: 15px;" onclick="openStats(); vibrate();">
        <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        Visa statistik
    </button>

    <form id="reportForm" novalidate>
        <div class="card" id="card-person">
            <label>Rapportör *</label>
            <input type="text" id="signatur" placeholder="Ditt namn..." required class="save-data">
            <label>Datum *</label>
            <input type="date" id="datum" required class="save-data">
            <label>Avdelning *</label>
            <select id="avdelning" required class="save-data">
                <option value="">-- Välj avdelning --</option>
                <option value="TVS">TVS</option>
                <option value="TPB">TPB</option>
            </select>
        </div>

        <div class="card" id="card-truck">
            <label>Truckstatus</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-truck-ok" onclick="setSegment('truck', 'OK'); vibrate();">OK</button>
                <button type="button" class="segment-btn" id="btn-truck-nok" onclick="setSegment('truck', 'NOK'); vibrate();">Felanmälan (NOK)</button>
            </div>
            <input type="hidden" id="truck" value="OK" class="save-data">
            <div id="truckContainer" class="hidden">
                <select id="truckId">
                    <option value="">-- Välj Truck --</option>
                    <option>TVS-01</option><option>TVS-02</option><option>TVS-03</option><option>TVS-04</option><option>TVS-05</option><option>TVS-06</option><option>TVS-13</option><option>TVS-22</option><option>TVS-23</option><option>TVS-33</option><option>TVS-34</option><option>TPB-07</option><option>TPB-08</option><option>TPB-09</option><option>TPB-10</option><option>TPB-14</option><option>TPB-15</option><option>TPB-20</option><option>TPB-21</option><option>Extra truck</option><option>Grå Skjutsativ</option>
                </select>
                <select id="truckFel">
                    <option value="">-- Feltyp --</option>
                    <option>Hydraulik/Olja</option><option>Chassi</option><option>Stativ</option><option>Batteri</option><option>Drag</option><option>Däck</option><option>Linde Connect</option><option>Övrigt</option>
                </select>
                <textarea id="truckKom" placeholder="Kommentar..."></textarea>
                <button type="button" class="add-btn" onclick="addItem('truck'); vibrate();">➕ Lägg till i listan</button>
                <div id="truckList" class="list-container hidden"></div>
            </div>
        </div>

        <div class="card" id="card-maskin">
            <label>Maskiner & Verktyg</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-maskin-ok" onclick="setSegment('maskin', 'OK'); vibrate();">OK</button>
                <button type="button" class="segment-btn" id="btn-maskin-nok" onclick="setSegment('maskin', 'Felanmälan (NOK)'); vibrate();">Felanmälan (NOK)</button>
            </div>
            <input type="hidden" id="maskin" value="OK" class="save-data">
            <div id="maskinContainer" class="hidden">
                <label>Välj:</label>
                <div class="machine-grid">
                    <div class="machine-item" onclick="selectMachine('Ergopack', this); vibrate();">
                        <div class="machine-circle"><img src="ergopack.png" alt="Ergo"></div>
                        <div class="machine-label">Ergopack</div>
                    </div>
                    <div class="machine-item" onclick="selectMachine('Bandmaskin', this); vibrate();">
                        <div class="machine-circle"><img src="bandning.png" alt="Band"></div>
                        <div class="machine-label">Bandmaskin</div>
                    </div>
                    <div class="machine-item" onclick="selectMachine('Movexx', this); vibrate();">
                        <div class="machine-circle"><img src="Movexx.png" alt="Pall"></div>
                        <div class="machine-label">Movexx</div>
                    </div>
                    <div class="machine-item" onclick="selectMachine('Pallyftare', this); vibrate();">
                        <div class="machine-circle"><img src="pallyft.png" alt="drag"></div>
                        <div class="machine-label">Pallyftare</div>
                    </div>
                    <div class="machine-item" onclick="selectMachine('Övrigt', this); vibrate();">
                        <div class="machine-circle"><img src="ovrigt.png" alt="Ovr"></div>
                        <div class="machine-label">Övrigt</div>
                    </div>
                </div>
                <input type="hidden" id="selectedMachineName" value="">
                
                <select id="machineFel">
                    <option value="">-- Feltyp --</option>
                    <option>Mekaniskt</option><option>Elektriskt</option><option>Lokal</option><option>Annat</option>
                </select>
                <textarea id="machineKom" placeholder="Kommentar..."></textarea>
                <button type="button" class="add-btn" onclick="addItem('maskin'); vibrate();">➕ Lägg till i listan</button>
                <div id="maskinList" class="list-container hidden"></div>
            </div>
        </div>

        <div class="card">
            <label>Tillsyn & Rengöring</label>
            <label style="font-weight: normal; font-size: 0.8em;">Daglig tillsyn truckar</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-tillsyn-ok" onclick="setSegment('tillsyn', 'OK'); vibrate();">OK</button>
                <button type="button" class="segment-btn" id="btn-tillsyn-nok" onclick="setSegment('tillsyn', 'NOK'); vibrate();">NOK</button>
            </div>
            <input type="hidden" id="tillsyn" value="OK" class="save-data">
            <div id="tillsynBox" class="hidden"><textarea id="tillsynfel" placeholder="Orsak?" class="save-data"></textarea></div>

            <label style="font-weight: normal; font-size: 0.8em;">Rengöring Bandningsmaskiner</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-rengoring-ok" onclick="setSegment('rengoring', 'OK'); vibrate();">OK</button>
                <button type="button" class="segment-btn" id="btn-rengoring-nok" onclick="setSegment('rengoring', 'Ej utfört'); vibrate();">Ej utfört</button>
            </div>
            <input type="hidden" id="rengoring" value="OK" class="save-data">
            <div id="rengoringBox" class="hidden"><textarea id="rengoringKommentar" placeholder="Orsak?" class="save-data"></textarea></div>
        </div>

        <div class="card">
            <label>Driftinformation & Avvikelser</label>
            <textarea id="drift" placeholder="Information..." class="save-data"></textarea>
            <textarea id="avvikelse" placeholder="Avvikelser..." class="save-data"></textarea>
            <textarea id="atgard" placeholder="Åtgärder..." class="save-data"></textarea>
        </div>

        <div class="button-group" style="display: flex; gap: 10px;">
            <button type="button" class="secondary" onclick="clearForm(); vibrate();" style="flex:1;">Rensa</button>
            <button type="submit" id="submitBtn" class="primary" style="flex:2;" onclick="vibrate(50);">Skicka Rapport</button>
        </div>
    </form>
    <div class="version-text">v1.1.19 • App-känsla & Vibration</div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <button class="danger" style="margin-bottom: 10px;" onclick="closeStats(); vibrate();">Stäng</button>
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQY0jbcHllFP-BC4h08x-mU28_9QuPBKOhcB4ue4HFUV8G7daNOsfoTUbAfDnMKmKm2-2T2NDLGDZIW/pubhtml?widget=true&amp;headers=false" width="100%" height="100%" style="border:none; border-radius: 8px;"></iframe>
    </div>
</div>

<script>
    let truckArray = []; let maskinArray = [];

    // Enkel funktion för att vibrera mobilen (haptisk feedback)
    function vibrate(ms = 20) {
        if (navigator.vibrate) navigator.vibrate(ms);
    }

    window.onload = function() {
        if(!document.getElementById('datum').value) document.getElementById('datum').valueAsDate = new Date();
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('darkmodeToggle').checked = true; }
        if (localStorage.getItem('fontSize') === 'large') { document.body.classList.add('large-text'); document.getElementById('largeTextToggle').checked = true; }
        
        document.querySelectorAll('.save-data').forEach(el => {
            const saved = localStorage.getItem('draft_' + el.id);
            if (saved) { el.value = saved; if (el.type === 'hidden') setSegment(el.id, saved, false); }
        });
        const sT = localStorage.getItem('draft_truckArray'); const sM = localStorage.getItem('draft_maskinArray');
        if(sT) { truckArray = JSON.parse(sT); renderList('truck'); }
        if(sM) { maskinArray = JSON.parse(sM); renderList('maskin'); }
    };

    document.addEventListener('input', (e) => { 
        if (e.target.classList.contains('save-data')) localStorage.setItem('draft_' + e.target.id, e.target.value); 
    });

    function toggleDarkMode() {
        const isChecked = document.getElementById('darkmodeToggle').checked;
        document.body.classList.toggle('dark-mode', isChecked);
        localStorage.setItem('theme', isChecked ? 'dark' : 'light');
    }

    function toggleLargeText() {
        const isChecked = document.getElementById('largeTextToggle').checked;
        document.body.classList.toggle('large-text', isChecked);
        localStorage.setItem('fontSize', isChecked ? 'large' : 'normal');
    }

    function setSegment(type, val, save = true) {
        document.getElementById(type).value = val;
        if(save) localStorage.setItem('draft_' + type, val);
        const okBtn = document.getElementById(`btn-${type}-ok`); const nokBtn = document.getElementById(`btn-${type}-nok`);
        const box = document.getElementById(type + (type==='truck'||type==='maskin'?'Container':(type==='tillsyn'||type==='rengoring'?'Box':'')));
        
        // Ta bort varningsfärg om man byter till OK
        if (val === 'OK') {
            document.getElementById(`card-${type}`)?.classList.remove('error-attention');
            okBtn.classList.add('active'); nokBtn.classList.remove('active', 'nok'); 
            if(box) box.classList.add('hidden'); 
        } else { 
            nokBtn.classList.add('active', 'nok'); okBtn.classList.remove('active'); 
            if(box) box.classList.remove('hidden'); 
        }
    }

    function selectMachine(name, element) {
        const alreadyActive = element.classList.contains('active');
        document.querySelectorAll('.machine-item').forEach(item => item.classList.remove('active'));
        if (alreadyActive) {
            document.getElementById('selectedMachineName').value = "";
        } else {
            element.classList.add('active');
            document.getElementById('selectedMachineName').value = name;
        }
    }

    function addItem(type) {
        if(type==='truck') {
            const id = document.getElementById('truckId'); const fel = document.getElementById('truckFel'); const kom = document.getElementById('truckKom');
            if (!id.value || !fel.value) { vibrate([50, 50, 50]); return alert("Välj truck och feltyp!"); }
            truckArray.push({ id: id.value, fel: fel.value, kom: kom.value });
            localStorage.setItem('draft_truckArray', JSON.stringify(truckArray));
            id.value = ""; fel.value = ""; kom.value = "";
            document.getElementById('card-truck').classList.remove('error-attention');
        } else {
            const id = document.getElementById('selectedMachineName').value; const fel = document.getElementById('machineFel'); const kom = document.getElementById('machineKom');
            if (!id || !fel.value) { vibrate([50, 50, 50]); return alert("Välj maskin (klicka på bilden) och feltyp!"); }
            maskinArray.push({ id: id, fel: fel.value, kom: kom.value });
            localStorage.setItem('draft_maskinArray', JSON.stringify(maskinArray));
            document.querySelectorAll('.machine-item').forEach(item => item.classList.remove('active'));
            document.getElementById('selectedMachineName').value = "";
            fel.value = ""; kom.value = "";
            document.getElementById('card-maskin').classList.remove('error-attention');
        }
        // Stäng tangentbord för bättre fokus på mobilen
        document.activeElement.blur();
        renderList(type);
    }

    function removeItem(type, idx) {
        vibrate(30);
        if(type==='truck') { truckArray.splice(idx, 1); localStorage.setItem('draft_truckArray', JSON.stringify(truckArray)); }
        else { maskinArray.splice(idx, 1); localStorage.setItem('draft_maskinArray', JSON.stringify(maskinArray)); }
        renderList(type);
    }

    function renderList(type) {
        const div = document.getElementById(type + 'List'); const arr = (type==='truck'?truckArray:maskinArray);
        if (arr.length === 0) { div.classList.add('hidden'); return; }
        div.classList.remove('hidden');
        div.innerHTML = arr.map((t, i) => `<div class="list-item"><span><strong>${t.id}</strong>: ${t.fel}</span><button type="button" class="danger" style="width:auto; padding:4px 8px;" onclick="removeItem('${type}', ${i})">Ta bort</button></div>`).join('');
    }

    function getSkift() { const h = new Date().getHours(); return (h>=6&&h<14)?"Dagskift":(h>=14&&h<22)?"Kvällsskift":"Nattskift"; }
    function clearForm() { if(confirm("Rensa allt?")) { localStorage.clear(); location.reload(); } }
    function openStats(){ document.getElementById("statsModal").style.display = "flex"; }
    function closeStats(){ document.getElementById("statsModal").style.display = "none"; }

    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        let hasError = false;
        
        // Återställ varningar
        document.querySelectorAll('.card').forEach(c => c.classList.remove('error-attention'));

        // Validering för Truckar
        if(document.getElementById('truck').value !== 'OK' && truckArray.length === 0) {
            document.getElementById('card-truck').classList.add('error-attention');
            hasError = true;
        }
        
        // Validering för Maskiner
        if(document.getElementById('maskin').value !== 'OK' && maskinArray.length === 0) {
            document.getElementById('card-maskin').classList.add('error-attention');
            hasError = true;
        }

        if (!this.checkValidity()) {
            document.getElementById('card-person').classList.add('error-attention');
            hasError = true;
        }

        if(hasError) {
            vibrate([100, 50, 100]);
            alert("Vänligen åtgärda markerade fält!");
            return;
        }

        const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "Skickar...";
        const data = {
            signatur: document.getElementById('signatur').value,
            datum: document.getElementById('datum').value,
            avdelning: document.getElementById('avdelning').value,
            skift: getSkift(),
            truckstatus: document.getElementById('truck').value,
            truckar: truckArray,
            maskiner: maskinArray,
            tillsyn: document.getElementById('tillsyn').value,
            tillsyn_kom: document.getElementById('tillsynfel').value,
            rengoring: document.getElementById('rengoring').value,
            rengoring_kom: document.getElementById('rengoringKommentar').value,
            drift: document.getElementById('drift').value,
            avvikelse: document.getElementById('avvikelse').value,
            atgard: document.getElementById('atgard').value
        };

        try { await fetch("https://script.google.com/macros/s/AKfycbwA1WxeZkJhRsWZ62g-9sEFNhMiVEqHygszbWPFXQ0BLCSVObgtt4e2arG848BJLgW0/exec", { method: "POST", body: JSON.stringify(data) }); } catch (err) {}

        let body = `SKIFTRAPPORT - ${data.datum}\nAvdelning: ${data.avdelning}\nSkift: ${data.skift}\nRapportör: ${data.signatur}\n\nTRUCKAR:\n`;
        if(truckArray.length>0) truckArray.forEach(t=>body+=`- ${t.id}: ${t.fel} (${t.kom})\n`); else body+="Inga anmärkningar.\n";
        body += `\nMASKINER:\n`;
        if(maskinArray.length>0) maskinArray.forEach(m=>body+=`- ${m.id}: ${m.fel} (${m.kom})\n`); else body+="Inga anmärkningar.\n";
        body += `\nTILLSYN: ${data.tillsyn} ${data.tillsyn_kom}\nRENGÖRING: ${data.rengoring} ${data.rengoring_kom}\n\nDRIFT: ${data.drift}\nAVVIKELSE: ${data.avvikelse}\nÅTGÄRD: ${data.atgard}`;

        const mail = ["rapport.vovlo@samhall.se", "volvooc@samhall.onmicrosoft.com"].join(navigator.userAgent.toLowerCase().includes("windows")?";":",");
        window.location.href = `mailto:${mail}?subject=${encodeURIComponent("Skiftrapport "+data.datum)}&body=${encodeURIComponent(body)}`;
        setTimeout(() => { btn.disabled = false; btn.innerText = "Skicka Rapport"; }, 3000);
    });
</script>
