<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport V3</title>

<style>
body{font-family: Arial;margin:15px;max-width:600px;}
h1{color:#2a4d69;}
label{display:block;margin-top:12px;font-weight:bold;}
input, select, textarea{width:100%;padding:10px;margin-top:5px;font-size:16px;}
button{width:100%;padding:15px;margin-top:15px;font-size:18px;background:#2a4d69;color:white;border:none;border-radius:6px;}
.clearBtn{background:#888;}
.hidden{display:none;}
.error{border:2px solid red;background:#ffe6e6;}
.previewBox{margin-top:20px;padding:15px;background:#f4f4f4;border-radius:6px;white-space:pre-line;}
.shiftBox{margin-top:10px;padding:10px;background:#eef3f7;border-radius:6px;font-weight:bold;}
</style>

</head>
<body>

<h1>📋 Skiftrapport</h1>
<div class="shiftBox" id="skiftText"></div>

<form id="reportForm">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj avdelning</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckFields" class="hidden">

<label>Truck ID</label>
<select id="truckId">
<option value="">Välj Truck ID</option>
<option>TVS-01</option>
<option>TVS-02</option>
<option>TPB-01</option>
<option>TPB-02</option>
</select>

<label>Feltyp</label>
<select id="truckType">
<option value="">Välj Feltyp</option>
<option>Hydraulik/Olja</option>
<option>Chassi</option>
<option>Stativ</option>
<option>Batteri</option>
<option>Drag</option>
<option>Däck</option>
<option>Linde Connect</option>
<option>Övrigt</option>
</select>

<label>Kommentar</label>
<textarea id="truckComment"></textarea>

<button type="button" id="addTruckBtn">Lägg till avvikelse</button>

<ul id="truckList"></ul>

</div>

<label>Daglig tillsyn</label>
<select id="tillsyn">
<option>OK</option>
<option>NOK</option>
</select>
<textarea id="tillsynfel" class="hidden"></textarea>

<label>Maskin</label>
<select id="maskin">
<option>OK</option>
<option>NOK</option>
</select>
<textarea id="maskinfel" class="hidden"></textarea>

<label>Rengöring</label>
<select id="rengoring">
<option>OK</option>
<option>NOK</option>
</select>
<textarea id="rengoringKommentar" class="hidden"></textarea>

<label>Driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="button" onclick="previewReport()">Förhandsgranska</button>
<button type="submit">Skicka</button>
<button type="button" class="clearBtn" onclick="clearForm()">Rensa</button>

</form>

<div id="preview" class="previewBox hidden"></div>

<script>

// ===== SKIFT =====
function getSkift(){
    let now=new Date();
    let m=now.getHours()*60+now.getMinutes();
    if(m>=350 && m<=480) return "Nattskift";
    if(m>=840 && m<=1020) return "Dagskift";
    if(m>=1320 || m<=120) return "Kvällsskift";
    return "Okänt";
}
document.getElementById("skiftText").textContent="Skift: "+getSkift();

// ===== ELEMENT =====
let datum=document.getElementById("datum");
let avdelning=document.getElementById("avdelning");
let truckstatus=document.getElementById("truckstatus");
let truckFields=document.getElementById("truckFields");
let truckId=document.getElementById("truckId");
let truckType=document.getElementById("truckType");
let truckComment=document.getElementById("truckComment");

let tillsyn=document.getElementById("tillsyn");
let tillsynfel=document.getElementById("tillsynfel");
let maskin=document.getElementById("maskin");
let maskinfel=document.getElementById("maskinfel");
let rengoring=document.getElementById("rengoring");
let rengoringKommentar=document.getElementById("rengoringKommentar");

let drift=document.getElementById("drift");
let avvikelse=document.getElementById("avvikelse");
let atgard=document.getElementById("atgard");

datum.valueAsDate=new Date();

// ===== VISA NOK FÄLT =====
truckstatus.onchange=()=>truckFields.style.display=(truckstatus.value==="NOK")?"block":"none";
tillsyn.onchange=()=>tillsynfel.classList.toggle("hidden",tillsyn.value!=="NOK");
maskin.onchange=()=>maskinfel.classList.toggle("hidden",maskin.value!=="NOK");
rengoring.onchange=()=>rengoringKommentar.classList.toggle("hidden",rengoring.value!=="NOK");

// ===== MULTI TRUCK =====
let truckArray=[];

document.getElementById("addTruckBtn").onclick=function(){
    if(!truckId.value||!truckType.value){
        alert("Välj Truck ID och Feltyp");
        return;
    }
    truckArray.push({id:truckId.value,type:truckType.value,comment:truckComment.value});
    updateList();
    truckId.value="";truckType.value="";truckComment.value="";
}

function updateList(){
    let ul=document.getElementById("truckList");
    ul.innerHTML="";
    truckArray.forEach((t,i)=>{
        let li=document.createElement("li");
        li.textContent=t.id+" | "+t.type+" | "+t.comment;
        let btn=document.createElement("button");
        btn.textContent="X";
        btn.onclick=()=>{truckArray.splice(i,1);updateList();}
        li.appendChild(btn);
        ul.appendChild(li);
    });
}

// ===== VALIDERING =====
function validate(){
    if(avdelning.value===""){alert("Välj avdelning");return false;}
    if(truckstatus.value==="NOK" && truckArray.length===0){
        alert("Lägg till minst en truckavvikelse");
        return false;
    }
    return true;
}

// ===== TEXT =====
function buildText(){
let text="";
text+="Datum: "+datum.value+"\n\n";
text+="Avdelning: "+avdelning.value+"\n\n";
text+="Truckstatus: "+truckstatus.value+"\n";

if(truckstatus.value==="NOK"){
truckArray.forEach((t,i)=>{
text+=`Avvikelse ${i+1}: ${t.id} | ${t.type} | ${t.comment}\n`;
});
text+="\n";
}

text+="Tillsyn: "+tillsyn.value+"\n";
if(tillsyn.value==="NOK") text+="Orsak: "+tillsynfel.value+"\n\n";

text+="Maskin: "+maskin.value+"\n";
if(maskin.value==="NOK") text+="Orsak: "+maskinfel.value+"\n\n";

text+="Rengöring: "+rengoring.value+"\n";
if(rengoring.value==="NOK") text+="Kommentar: "+rengoringKommentar.value+"\n\n";

text+="Drift:\n"+drift.value+"\n\n";
text+="Avvikelse:\n"+avvikelse.value+"\n\n";
text+="Åtgärd:\n"+atgard.value;

return text;
}

// ===== PREVIEW =====
function previewReport(){
if(!validate()) return;
let p=document.getElementById("preview");
p.textContent=buildText();
p.classList.remove("hidden");
}

// ===== SKICKA =====
document.getElementById("reportForm").onsubmit=function(e){
e.preventDefault();
if(!validate()) return;

let subject="Skiftrapport "+datum.value+" - "+getSkift();
let body=buildText();

// MAIL
let sep=/android/i.test(navigator.userAgent)?",":";";
let emails=["rapport.vovlo@samhall.se","volvooc@samhall.onmicrosoft.com"].join(sep);

window.location.href="mailto:"+emails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

// GOOGLE SHEETS
let url="https://script.google.com/macros/s/AKfycbxBPbepfp6rn9xXHw0FC7l0ow_jng6fYys-uhMsNb8LeK4yJLMhNrb_zaxTh_ctv1yxig/exec";

fetch(url,{
method:"POST",
body:JSON.stringify({
datum:datum.value,
avdelning:avdelning.value,
truckstatus:truckstatus.value,
truckar:truckArray,
tillsyn:tillsyn.value,
maskin:maskin.value,
rengoring:rengoring.value,
drift:drift.value,
avvikelse:avvikelse.value,
atgard:atgard.value
})
});

}

// ===== RENSNING =====
function clearForm(){
document.getElementById("reportForm").reset();
truckArray=[];
updateList();
document.getElementById("preview").classList.add("hidden");
truckFields.style.display="none";
datum.valueAsDate=new Date();
}

</script>

</body>
</html>
