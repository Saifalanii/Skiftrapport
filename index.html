<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
.container{max-width:600px;margin:auto;padding:15px;}
h2{text-align:center;}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08);margin-bottom:15px;}

label{display:block;margin-top:12px;font-weight:bold;}
#datum{width:60%;}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{min-height:80px;resize:vertical;}

button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.primary{background:#2a4d69;color:white;}
.secondary{background:#888;color:white;}
.danger{background:#c0392b;color:white;}

.hidden{display:none;}
.truckListConfirmed{margin-top:10px;background:#eef3f7;padding:10px;border-radius:6px;}
.error{border:2px solid red !important;background:#ffe6e6;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000;}
.modalContent{background:white;width:90%;max-width:700px;border-radius:12px;padding:10px;}
</style>
</head>

<body>

<div class="container">
<h2>📋 Skiftrapport</h2>
<button class="primary" onclick="openStats()">📊 Visa statistik</button>

<form id="form" class="card">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus" onchange="toggleTruck()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckContainer" class="hidden">
<div id="truckFields"></div>
<div id="truckConfirmed" class="truckListConfirmed"></div>
</div>

<label>Daglig tillsyn truckar</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="tillsynBox" class="hidden">
<textarea id="tillsynfel" placeholder="Orsak"></textarea>
</div>

<label>Maskiner & Verktyg</label>
<select id="maskin" onchange="toggleMaskin()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="maskinBox" class="hidden">
  <div id="maskinFields"></div>
  <div id="maskinConfirmed" class="truckListConfirmed"></div>
</div>

<label>Rengöring av Bandningsmaskiner</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="rengoringBox" class="hidden">
<textarea id="rengoringKommentar" placeholder="Orsak"></textarea>
</div>

<label>Övriga driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="submit" class="primary">Skicka</button>
<button type="button" class="secondary" onclick="clearForm()">Börja om</button>

</form>
</div>

<div id="statsModal" class="modal">
  <div class="modalContent">
    <button class="danger" onclick="closeStats()">Stäng</button>
    <iframe 
      id="statsFrame" 
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQY0jbcHllFP-BC4h08x-mU28_9QuPBKOhcB4ue4HFUV8G7daNOsfoTUbAfDnMKmKm2-2T2NDLGDZIW/pubhtml?widget=true&amp;headers=false" 
      width="100%" 
      height="500">
    </iframe>
  </div>
</div>

<script>
datum.valueAsDate=new Date();
let truckArray=[];
let maskinArray=[];

function openStats(){
  document.getElementById("statsModal").style.display="flex";
}
function closeStats(){
  document.getElementById("statsModal").style.display="none";
}

function getSkift(){
  let now=new Date();
  let min=now.getHours()*60+now.getMinutes();
  if(min>=350&&min<=480)return"Nattskift";
  if(min>=840&&min<=1020)return"Dagskift";
  if(min>=1320||min<=120)return"Kvällsskift";
  return"Okänt Skift";
}

function toggleField(sel,box){
  document.getElementById(box).style.display=
  document.getElementById(sel).value==="NOK"?"block":"none";
}

/* Truck */
function toggleTruck(){
  if(truckstatus.value==="NOK"){
    truckContainer.style.display="block";
    if(truckFields.childElementCount===0) createTruckInput();
  }else{
    truckContainer.style.display="none";
    truckFields.innerHTML="";
    truckConfirmed.innerHTML="";
    truckArray=[];
  }
}

function createTruckInput(){
  truckFields.innerHTML=`
    <select id="truckId">
      <option value="">Välj Truck</option>
      <option>TVS-01</option>
      <option>TVS-02</option>
      <option>TVS-03</option>
      <option>TVS-04</option>
      <option>TVS-05</option>
      <option>TVS-06</option>
      <option>TVS-13</option>
      <option>TVS-22</option>
      <option>TVS-23</option>
      <option>TVS-33</option>
      <option>TVS-34</option>
      <option>TPB-07</option>
      <option>TPB-08</option>
      <option>TPB-09</option>
      <option>TPB-10</option>
      <option>TPB-14</option>
      <option>TPB-15</option>
      <option>TPB-20</option>
      <option>TPB-21</option>
      <option>Extra truck</option>
      <option>Grå Skjutsativ</option>
    </select>
    <select id="truckFel">
      <option value="">Välj Feltyp</option>
      <option>Hydraulik/Olja</option>
      <option>Chassi</option>
      <option>Stativ</option>
      <option>Batteri</option>
      <option>Drag</option>
      <option>Däck</option>
      <option>Linde Connect</option>
      <option>Övrigt</option>
    </select>
    <textarea id="truckKom" placeholder="Orsak"></textarea>
    <button type="button" onclick="confirmTruck()">Bekräfta</button>
  `;
}

function confirmTruck(){
  let id=truckId.value, fel=truckFel.value, kom=truckKom.value;
  if(!id||!fel) return;
  truckArray.push({id,fel,kom});
  renderTrucks();
  truckId.value=""; truckFel.value=""; truckKom.value="";
}
function renderTrucks(){
  let html=""; truckArray.forEach((t,i)=>{
    html+=`${i+1}. ${t.id} (${t.fel})`;
    if(t.kom) html+=" - "+t.kom; html+="<br>";
  });
  truckConfirmed.innerHTML=html;
}

/* Maskin */
function toggleMaskin(){
  if(maskin.value==="NOK"){
    maskinBox.style.display="block";
    if(maskinFields.childElementCount===0) createMaskinInput();
  }else{
    maskinBox.style.display="none";
    maskinFields.innerHTML="";
    maskinConfirmed.innerHTML="";
    maskinArray=[];
  }
}
function createMaskinInput(){
  maskinFields.innerHTML=`
    <select id="maskinId">
      <option value="">Välj Maskin</option>
      <option>Bandare-01</option>
      <option>Bandare-02</option>
      <option>Verktyg-01</option>
      <option>Verktyg-02</option>
    </select>
    <select id="maskinFelTyp">
      <option value="">Välj Feltyp</option>
      <option>Mekaniskt</option>
      <option>Elektriskt</option>
      <option>Övrigt</option>
    </select>
    <textarea id="maskinKommentar" placeholder="Orsak"></textarea>
    <button type="button" onclick="confirmMaskin()">Bekräfta</button>
  `;
}
function confirmMaskin(){
  let id=maskinId.value, fel=maskinFelTyp.value, kom=maskinKommentar.value;
  if(!id||!fel) return;
  maskinArray.push({id,fel,kom});
  renderMaskiner();
  maskinId.value=""; maskinFelTyp.value=""; maskinKommentar.value="";
}
function renderMaskiner(){
  let html=""; maskinArray.forEach((m,i)=>{
    html+=`${i+1}. ${m.id} (${m.fel})`;
    if(m.kom) html+=" - "+m.kom; html+="<br>";
  });
  maskinConfirmed.innerHTML=html;
}

/* SUBMIT */
form.addEventListener("submit", async function(e){
  e.preventDefault();

  let body="";
  body+="Datum: "+datum.value+"\nAvdelning: "+avdelning.value+"\n\n";
  body+="Truckstatus: "+truckstatus.value+"\n";
  truckArray.forEach(t=>{ body+="- "+t.id+" ("+t.fel+")"; if(t.kom) body+=" - "+t.kom; body+="\n"; });
  body+="\nMaskiner: "+maskin.value+"\n";
  maskinArray.forEach(m=>{ body+="- "+m.id+" ("+m.fel+")"; if(m.kom) body+=" - "+m.kom; body+="\n"; });
  body+="\nDaglig tillsyn: "+tillsyn.value; if(tillsyn.value==="NOK") body+="\nOrsak: "+tillsynfel.value;
  body+="\nRengöring: "+rengoring.value; if(rengoring.value==="NOK") body+="\nOrsak: "+rengoringKommentar.value;
  body+="\nÖvriga driftstörningar: "+drift.value;
  body+="\nAvvikelse: "+avvikelse.value;
  body+="\nÅtgärd: "+atgard.value;

  // SEND TO GOOGLE SHEETS (all reports)
  await fetch("https://script.google.com/macros/s/AKfycby240ZXZhVS6_c-Dg8PihpwY1fYKeXZhUM2Buh85kCYa_tyaKY2ka36Qhakh9lUPec_qA/exec", {
    method:"POST",
    body: JSON.stringify({
      datum: datum.value,
      avdelning: avdelning.value,
      skift: getSkift(),
      truckstatus: truckstatus.value,
      truckar: truckArray,
      maskin: maskin.value,
      maskiner: maskinArray,
      tillsyn: tillsyn.value,
      tillsynfel: tillsynfel.value,
      rengoring: rengoring.value,
      rengoringKommentar: rengoringKommentar.value,
      drift: drift.value,
      avvikelse: avvikelse.value,
      atgard: atgard.value
    })
  });

  // OPEN OUTLOOK MAIL TO BOTH RECIPIENTS (ALL REPORTS)
  let subject="Skiftrapport "+datum.value+" - "+getSkift();
  let outlookEmails=["rapport.vovlo@samhall.se","volvooc@samhall.onmicrosoft.com"].join(";");
  window.location.href="mailto:"+outlookEmails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

  clearForm();
});

/* CLEAR */
function clearForm(){
  form.reset();
  truckArray=[]; maskinArray=[];
  truckFields.innerHTML=""; maskinFields.innerHTML="";
  truckConfirmed.innerHTML=""; maskinConfirmed.innerHTML="";
  truckContainer.style.display="none"; maskinBox.style.display="none";
  datum.valueAsDate=new Date();
}
</script>

</body>
</html>
