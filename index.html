<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Skyddad Sida</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --primary-color: #5b5fc7;
                --bg-color: #f0f2f5;
                --card-bg: #ffffff;
                --text-color: #333;
                --error-color: #e74c3c;
            }

            body, html {
                height: 100%;
                margin: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
            }

            .staticrypt-page {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                padding: 20px;
            }

            .staticrypt-form {
                background: var(--card-bg);
                width: 100%;
                max-width: 400px;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                text-align: center;
                transition: transform 0.3s ease;
            }

            .shake {
                animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            }

            @keyframes shake {
                10%, 90% { transform: translate3d(-1px, 0, 0); }
                20%, 80% { transform: translate3d(2px, 0, 0); }
                30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                40%, 60% { transform: translate3d(4px, 0, 0); }
            }

            .staticrypt-title {
                font-size: 24px;
                font-weight: 600;
                margin-bottom: 10px;
                color: var(--primary-color);
            }

            .staticrypt-instructions p {
                color: #666;
                font-size: 14px;
                margin-bottom: 25px;
            }

            .staticrypt-password-container {
                position: relative;
                margin-bottom: 20px;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 12px 40px 12px 15px;
                border: 2px solid #ddd;
                border-radius: 8px;
                font-size: 16px;
                box-sizing: border-box;
                transition: border-color 0.3s;
            }

            .staticrypt-form input:focus {
                outline: none;
                border-color: var(--primary-color);
            }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                opacity: 0.5;
                width: 20px;
                transition: opacity 0.2s;
            }

            .staticrypt-decrypt-button {
                width: 100%;
                padding: 12px;
                background-color: var(--primary-color);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.3s, transform 0.1s;
            }

            .staticrypt-decrypt-button:hover {
                background-color: #4a4eb0;
            }

            .staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: flex-start;
                margin-bottom: 20px;
                font-size: 14px;
                color: #555;
                cursor: pointer;
            }

            .staticrypt-remember input {
                margin-right: 10px;
                width: 18px;
                height: 18px;
            }

            #error-message {
                color: var(--error-color);
                font-size: 13px;
                margin-bottom: 15px;
                display: none;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid #f3f3f3;
                border-top: 5px solid var(--primary-color);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>

    <body>
        <div id="staticrypt_loading" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">
                <div class="staticrypt-form" id="form-card">
                    <div class="staticrypt-instructions">
                        <div class="staticrypt-title">Skyddad Sida</div>
                        <p>Innehållet är krypterat. Vänligen ange lösenord.</p>
                    </div>

                    <form id="staticrypt-form" action="#" method="post">
                        <div class="staticrypt-password-container">
                            <input id="staticrypt-password" type="password" name="password" placeholder="Lösenord" autofocus />
                            <img id="toggle-icon" class="staticrypt-toggle-password-visibility" alt="Visa" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBkPSJNMjg4IDMyYzY5LjYgMCAxMzIuMSAyMy40IDE4Mi44IDYyLjFsLTQwLjMgNDAuM2MtMjUuOC0xNC42LTU0LjYtMjIuNC04NC41LTIyLjQtMTA2IDAtMTkyIDg2LTE5MiAxOTJzODYgMTkyIDE5MiAxOTJjMjkuOSAwIDU4LjctNy44IDg0LjUtMjIuNGw0MC4zIDQwLjNjLTUwLjcgMzguNy0xMTMuMiA2Mi4xLTE4Mi44IDYyLjEtMTU5IDAtMjg4LTEyOS0yODgtMjg4UzEyOSAzMiAyODggMzJ6bTAgOTZjLTUzIDAtOTYgNDMtOTYgOTZzNDMgOTYgOTYgOTYgOTYtNDMgOTYtOTYtNDMtOTYtOTYtOTZ6Ii8+PC9zdmc+" />
                        </div>

                        <div id="error-message">Fel lösenord, försök igen.</div>

                        <label class="staticrypt-remember">
                            <input id="staticrypt-remember" type="checkbox" name="remember" checked />
                            Kom ihåg mig på denna enhet
                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="Lås upp" />
                    </form>
                </div>
            </div>
        </div>

        <script>
            // --- INBYGGD KRYPTERINGSLOGIK ---
            const cryptoEngine = (function() {
                const { subtle } = crypto;
                const HexEncoder = {
                    parse: (hex) => new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16))),
                    stringify: (bytes) => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('')
                };
                const UTF8Encoder = {
                    parse: (str) => new TextEncoder().encode(str),
                    stringify: (bytes) => new TextDecoder().decode(bytes)
                };
                return {
                    hashPassword: async (p, s) => {
                        let h = await pbkdf2(p, s, 1000, "SHA-1");
                        h = await pbkdf2(h, s, 14000, "SHA-256");
                        return pbkdf2(h, s, 585000, "SHA-256");
                    },
                    decrypt: async (msg, h) => {
                        const iv = HexEncoder.parse(msg.substring(0, 32));
                        const key = await subtle.importKey("raw", HexEncoder.parse(h), "AES-CBC", false, ["decrypt"]);
                        const out = await subtle.decrypt({ name: "AES-CBC", iv }, key, HexEncoder.parse(msg.substring(32)));
                        return UTF8Encoder.stringify(new Uint8Array(out));
                    },
                    signMessage: async (h, m) => {
                        const key = await subtle.importKey("raw", HexEncoder.parse(h), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
                        const sig = await subtle.sign("HMAC", key, UTF8Encoder.parse(m));
                        return HexEncoder.stringify(new Uint8Array(sig));
                    }
                };
                async function pbkdf2(p, s, i, a) {
                    const k = await subtle.importKey("raw", UTF8Encoder.parse(p), "PBKDF2", false, ["deriveBits"]);
                    const b = await subtle.deriveBits({ name: "PBKDF2", hash: a, iterations: i, salt: UTF8Encoder.parse(s) }, k, 256);
                    return HexEncoder.stringify(new Uint8Array(b));
                }
            })();

            // --- DIN UNIKA DATA (BEHÅLLD FRÅN ORIGINALET) ---

d3b1647b26e2c0c55e9e6b283cb1b995d5a576aa2e5b6391ed30fc6639db6e4230abc43993f2dd1111b072253edf6aa1522af919b8963da224dc2f08e42245baaaf1a689869595360d4cf9361483c2513037cd58f8c63633df1f1b5c5db1b4e1d2c560ec4f4e08ac43bdcc226523cca020de6850a5cd4087fbd6f6339e2fb4b5c7533741b5a90c9afdccc0e27c726b2add729e5c2040e7a8cc5a1283ea2f49d3a4eed8150b30a721511ad37332ab5fd3cb9a85b04d7295aafc71e66fe3199ae8ed2e520f253b1c46c35ebe59ae74249f80b8826bc409e0386b9bf26f54b9e4ab3992ed8a10b4a3a2f50f9bf196fd37cfb6cd48f598e43fde43d61a273c5454f7a280c2de4a981b3a00be07759774de8afac45e5a1e6bd6a432baafa784a4a270cf7a60fe4b6cb7a84abcee85e9a921aef8e165b89a82b003022fff8a885ee28e40a54ce3637865c0e578792c1cb120b9bfac2b058c13202232b8f6355b547a42d5daff7a2b645677ccd897a51efddd098b64db40738356c315487fa544934a6994e383871e3e36o","staticryptSaltUniqueVariableName":"31e3e36o"};

            // --- UI FUNKTIONER ---
            const passInput = document.getElementById('staticrypt-password');
            const toggleIcon = document.getElementById('toggle-icon');
            const form = document.getElementById('staticrypt-form');
            const errorMsg = document.getElementById('error-message');
            const card = document.getElementById('form-card');

            toggleIcon.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleIcon.style.opacity = isPass ? '1' : '0.5';
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                const pwd = passInput.value;
                const hashed = await cryptoEngine.hashPassword(pwd, staticryptConfig.staticryptSaltUniqueVariableName);
                
                const signedMsg = staticryptConfig.staticryptEncryptedMsgUniqueVariableName;
                const encryptedHMAC = signedMsg.substring(0, 64);
                const encryptedMsg = signedMsg.substring(64);
                const decryptedHMAC = await cryptoEngine.signMessage(hashed, encryptedMsg);

                if (decryptedHMAC !== encryptedHMAC) {
                    errorMsg.style.display = 'block';
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 500);
                    return;
                }

                try {
                    const plainHTML = await cryptoEngine.decrypt(encryptedMsg, hashed);
                    document.write(plainHTML);
                    document.close();
                } catch (e) {
                    errorMsg.style.display = 'block';
                }
            });

            // Visa innehåll efter laddning
            window.addEventListener('load', () => {
                document.getElementById('staticrypt_loading').classList.add('hidden');
                document.getElementById('staticrypt_content').classList.remove('hidden');
            });
        </script>
    </body>
</html>
