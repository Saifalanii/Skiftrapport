<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport</title>

<style>
body{font-family:Arial;margin:15px;max-width:600px;}
label{display:block;margin-top:12px;font-weight:bold;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;}
button{width:100%;padding:15px;margin-top:15px;background:#2a4d69;color:white;border:none;border-radius:6px;}
.hidden{display:none;}
.error{border:2px solid red;background:#ffe6e6;}
</style>
</head>
<body>

<h2>📋 Skiftrapport</h2>

<form id="form">

<label>Datum</label>
<input type="date" id="datum">

<label>Avdelning</label>
<select id="avdelning">
<option value="">Välj</option>
<option>TVS</option>
<option>TPB</option>
</select>

<label>Truckstatus</label>
<select id="truckstatus" onchange="toggleTruck()">
<option>OK</option>
<option>NOK</option>
</select>

<div id="truckContainer" class="hidden">
<div id="truckList"></div>
<button type="button" onclick="addTruck()">+ Lägg till truck</button>
</div>

<label>Daglig tillsyn</label>
<select id="tillsyn" onchange="toggleField('tillsyn','tillsynBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="tillsynBox" class="hidden">
<textarea id="tillsynfel" placeholder="Orsak"></textarea>
</div>

<label>Maskin</label>
<select id="maskin" onchange="toggleField('maskin','maskinBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="maskinBox" class="hidden">
<textarea id="maskinfel" placeholder="Orsak"></textarea>
</div>

<label>Rengöring</label>
<select id="rengoring" onchange="toggleField('rengoring','rengoringBox')">
<option>OK</option>
<option>NOK</option>
</select>
<div id="rengoringBox" class="hidden">
<textarea id="rengoringKommentar" placeholder="Kommentar"></textarea>
</div>

<label>Driftstörningar</label>
<textarea id="drift"></textarea>

<label>Avvikelse</label>
<textarea id="avvikelse"></textarea>

<label>Åtgärd</label>
<textarea id="atgard"></textarea>

<button type="submit">Skicka</button>

</form>

<script>

// ===== DATUM =====
datum.valueAsDate = new Date();

// ===== VISA/GÖM =====
function toggleField(sel, box){
document.getElementById(box).style.display =
document.getElementById(sel).value==="NOK" ? "block":"none";
}

// ===== TRUCK =====
function toggleTruck(){
let status = truckstatus.value;
truckContainer.style.display = status==="NOK" ? "block":"none";
}

// ===== LÄGG TILL TRUCK =====
function addTruck(){
let div = document.createElement("div");

div.innerHTML = `
<select class="truckid">
<option value="">Truck ID</option>
<option>TVS-01</option>
<option>TVS-02</option>
<option>TPB-01</option>
<option>TPB-02</option>
</select>

<select class="feltyp">
<option value="">Feltyp</option>
<option>Hydraulik/Olja</option>
<option>Chassi</option>
<option>Stativ</option>
<option>Batteri</option>
<option>Drag</option>
<option>Däck</option>
<option>Linde Connect</option>
<option>Övrigt</option>
</select>

<textarea class="kommentar" placeholder="Kommentar (valfri)"></textarea>
<hr>
`;

truckList.appendChild(div);
}

// ===== VALIDERING =====
function validate(){

document.querySelectorAll(".error").forEach(e=>e.classList.remove("error"));

if(avdelning.value===""){
avdelning.classList.add("error");
alert("Välj avdelning");
return false;
}

// truckar
if(truckstatus.value==="NOK"){

let rows = document.querySelectorAll("#truckList > div");

if(rows.length===0){
alert("Lägg till minst en truck");
return false;
}

let validTruck = false;

rows.forEach(row=>{
let id = row.querySelector(".truckid");
let fel = row.querySelector(".feltyp");

if(id.value || fel.value){
validTruck = true;

if(id.value===""){
id.classList.add("error");
}
if(fel.value===""){
fel.classList.add("error");
}
}
});

if(!validTruck){
alert("Fyll i minst en truck");
return false;
}
}

// övrigt NOK
if(tillsyn.value==="NOK" && tillsynfel.value===""){tillsynfel.classList.add("error"); return false;}
if(maskin.value==="NOK" && maskinfel.value===""){maskinfel.classList.add("error"); return false;}
if(rengoring.value==="NOK" && rengoringKommentar.value===""){rengoringKommentar.classList.add("error"); return false;}

return true;
}

// ===== SKICKA =====
form.addEventListener("submit", function(e){
e.preventDefault();

if(!validate()) return;

// samla truckar
let truckArray = [];

document.querySelectorAll("#truckList > div").forEach(row=>{
let id = row.querySelector(".truckid").value;
let fel = row.querySelector(".feltyp").value;
let kom = row.querySelector(".kommentar").value;

if(id && fel){
truckArray.push({id,fel,kom});
}
});

// ===== GOOGLE SHEETS =====
fetch("https://script.google.com/macros/s/AKfycbzmoMBgSfTsLPMbfUNOa-Y2XSzjRwd2l1bnWqsq5np6OntT6z4Hjaw-SX65XHS8sjk7/exec",{
method:"POST",
body:JSON.stringify({
datum: datum.value,
avdelning: avdelning.value,
truckstatus: truckstatus.value,
tillsyn: tillsyn.value,
tillsynfel: tillsynfel.value,
maskin: maskin.value,
maskinfel: maskinfel.value,
rengoring: rengoring.value,
rengoringKommentar: rengoringKommentar.value,
drift: drift.value,
avvikelse: avvikelse.value,
atgard: atgard.value,
truckar: truckArray
})
});

// ===== MAIL =====
let subject = "Skiftrapport "+datum.value;

let body = "Datum: "+datum.value+"\n\n";
body += "Avdelning: "+avdelning.value+"\n\n";

truckArray.forEach(t=>{
body += "Truck: "+t.id+" - "+t.fel+"\n";
if(t.kom) body += "Kommentar: "+t.kom+"\n";
body += "\n";
});

body += "Tillsyn: "+tillsyn.value+"\n";
if(tillsyn.value==="NOK") body += tillsynfel.value+"\n\n";

body += "Maskin: "+maskin.value+"\n";
if(maskin.value==="NOK") body += maskinfel.value+"\n\n";

body += "Rengöring: "+rengoring.value+"\n";
if(rengoring.value==="NOK") body += rengoringKommentar.value+"\n\n";

let emails = [
"rapport.vovlo@samhall.se",
"volvooc@samhall.onmicrosoft.com"
].join(",");

window.location.href =
"mailto:"+emails+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

alert("Skickat!");
});

</script>
</body>
</html>
