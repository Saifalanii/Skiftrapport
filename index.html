<script>
// ===== SKIFT =====
function getSkift(){
    let now = new Date();
    let min = now.getHours()*60 + now.getMinutes();
    if(min>=350 && min<=480) return "Nattskift";
    if(min>=840 && min<=1020) return "Dagskift";
    if(min>=1320 || min<=120) return "Kvällsskift";
    return "Okänt skift";
}
document.getElementById("skiftText").textContent = "Skift: " + getSkift();

// ===== VISA/GÖM =====
function toggleField(selectId, fieldId){
    let status = document.getElementById(selectId).value;
    let field = document.getElementById(fieldId);
    field.style.display = (status==="NOK") ? "block" : "none";
}

// ===== RENSAR FEL =====
function clearErrors(){document.querySelectorAll(".error").forEach(el => el.classList.remove("error"));}

// ===== SCROLL TILL FEL =====
function scrollToError(){let error = document.querySelector(".error"); if(error){error.scrollIntoView({behavior:"smooth", block:"center"});}}

// ===== VALIDERING =====
function validate(){
    clearErrors();
    let errorFound = false;

    if(truckstatus.value==="NOK" && truckfel.value.trim()===""){truckfel.classList.add("error"); errorFound=true;}
    if(tillsyn.value==="NOK" && tillsynfel.value.trim()===""){tillsynfel.classList.add("error"); errorFound=true;}
    if(maskin.value==="NOK" && maskinfel.value.trim()===""){maskinfel.classList.add("error"); errorFound=true;}
    if(rengoring.value==="NOK" && rengoringKommentar.value.trim()===""){rengoringKommentar.classList.add("error"); errorFound=true;}
    if(avdelning.value===""){avdelning.classList.add("error"); errorFound=true;}

    if(errorFound){
        alert("Fyll i alla obligatoriska fält (orsak vid NOK).");
        scrollToError();
        return false;
    }
    return true;
}

// ===== BYGG TEXT =====
function buildText(){
    let datum = datumEl.value;
    let text = "";

    text += "Datum: "+datum+"\n\n";
    text += "Avdelning: "+avdelning.value+"\n\n";

    text += "Truckstatus: "+truckstatus.value+"\n";
    if(truckstatus.value==="NOK") text += "Orsak: "+truckfel.value+"\n\n";

    text += "Daglig tillsyn truckar: "+tillsyn.value+"\n";
    if(tillsyn.value==="NOK") text += "Orsak: "+tillsynfel.value+"\n\n";

    text += "Maskin/verktyg: "+maskin.value+"\n";
    if(maskin.value==="NOK") text += "Orsak: "+maskinfel.value+"\n\n";

    text += "Rengöring bandningsmaskiner: "+rengoring.value+"\n";
    if(rengoring.value==="NOK") text += "Kommentar: "+rengoringKommentar.value+"\n\n";

    text += "Driftstörningar:\n"+drift.value+"\n\n";
    text += "Avvikelse:\n"+avvikelse.value+"\n\n";
    text += "Åtgärd:\n"+atgard.value;

    return text;
}

// ===== FÖRHANDSGRANSKA =====
function previewReport(){
    if(!validate()) return;
    let preview = document.getElementById("preview");
    preview.textContent = buildText();
    preview.classList.remove("hidden");
}

// ===== SKICKA =====
document.getElementById("reportForm").addEventListener("submit", function(e){
    e.preventDefault(); 
    if(!validate()) return;

    let subject = "Skiftrapport "+datumEl.value+" - "+getSkift();
    let body = buildText();

    // ===== GOOGLE SHEETS (NY DEL) =====
    let url = "https://docs.google.com/spreadsheets/d/1OqkWtPtQs0CX8n2YHGU4Mh0TrIXex4DU1HJ-AeRfGRo/edit?gid=0#gid=0";

  
    method: "POST",
    body: JSON.stringify({
        datum: datumEl.value,
        avdelning: avdelning.value,
        skift: getSkift(),
        truckstatus: truckstatus.value,
        truckfel: truckfel.value,
        tillsyn: tillsyn.value,
        tillsynfel: tillsynfel.value,
        maskin: maskin.value,
        maskinfel: maskinfel.value,
        rengoring: rengoring.value,
        rengoringKommentar: rengoringKommentar.value,
        drift: drift.value,
        avvikelse: avvikelse.value,
        atgard: atgard.value
    })
});

    // ===== MAIL =====
    let separator = /android/i.test(navigator.userAgent) ? "," : ";";

    let emails = [
        "rapport.vovlo@samhall.se",
        "volvooc@samhall.onmicrosoft.com"
    ].join(separator);

    window.location.href =
    "mailto:"+emails+
    "?subject="+encodeURIComponent(subject)+
    "&body="+encodeURIComponent(body);
});

// ===== RENSNING =====
function clearForm(){
    document.getElementById("reportForm").reset();
    document.getElementById("preview").classList.add("hidden");
    datumEl.valueAsDate = new Date();
}

// ===== ELEMENT =====
let datumEl = document.getElementById("datum");
let avdelning = document.getElementById("avdelning");
let truckstatus = document.getElementById("truckstatus");
let truckfel = document.getElementById("truckfel");
let tillsyn = document.getElementById("tillsyn");
let tillsynfel = document.getElementById("tillsynfel");
let maskin = document.getElementById("maskin");
let maskinfel = document.getElementById("maskinfel");
let rengoring = document.getElementById("rengoring");
let rengoringKommentar = document.getElementById("rengoringKommentar");
let drift = document.getElementById("drift");
let avvikelse = document.getElementById("avvikelse");
let atgard = document.getElementById("atgard");

// ===== DATUM =====
datumEl.valueAsDate = new Date();

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(err=>console.log("Service worker fel: ", err));
}
</script>
