<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skiftrapport</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --teams-purple: #5b5fc7;
            --teams-purple-hover: #444791;
            --teams-bg: #e8eaed; 
            --teams-card: #ffffff; 
            --teams-border: #d1d1d1; 
            --text-main: #242424;
            --text-sec: #616161;
            --danger: #c0392b;
            --success: #27ae60;
        }

        body.dark-mode {
            --teams-bg: #111111;
            --teams-card: #202020;
            --teams-border: #444444;
            --text-main: #ffffff;
            --text-sec: #adadad;
            --teams-purple: #7f85f5;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--teams-bg);
            color: var(--text-main);
            line-height: 1.5;
            transition: background 0.3s;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px;
        }

        .icon {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 8px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 10px;
        }

        .theme-switch {
            display: inline-block; height: 20px; position: relative; width: 38px;
        }

        .theme-switch input { display: none; }

        .slider {
            background-color: #ccc; bottom: 0; cursor: pointer; left: 0;
            position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px;
        }

        .slider:before {
            background-color: #fff; bottom: 2px; content: ""; height: 16px; left: 2px;
            position: absolute; transition: .4s; width: 16px; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        .switch-label { font-size: 11px; font-weight: 600; text-transform: uppercase; }

        h2 { 
            text-align: center; margin: 15px 0; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: var(--teams-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--teams-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            margin-bottom: 20px;
        }

        label {
            display: block; margin-bottom: 6px; font-weight: bold;
            font-size: 0.85rem; color: var(--text-main);
        }

        input, select, textarea {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border-radius: 8px; border: 1px solid var(--teams-border);
            font-size: 16px; background-color: var(--teams-card);
            color: var(--text-main); outline: none;
        }

        .segmented-control {
            display: flex; background: var(--teams-bg);
            padding: 4px; border-radius: 8px; margin-bottom: 15px;
            border: 1px solid var(--teams-border);
        }

        .segment-btn {
            flex: 1; border: none; padding: 8px; background: transparent;
            color: var(--text-sec); font-weight: 600; font-size: 0.85rem;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }

        .segment-btn.active {
            background: var(--teams-card);
            color: var(--teams-purple);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .segment-btn.active.nok { color: var(--danger); }

        .button-group { display: flex; gap: 10px; margin-top: 10px; }

        button {
            padding: 12px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }

        .primary { background: var(--teams-purple); color: white; flex: 2; }
        .secondary { background: var(--teams-card); color: var(--text-main); border: 1px solid var(--teams-border); flex: 1; }
        .danger { background: var(--danger); color: white; }
        .add-btn { background: var(--success); color: white; margin-top: 5px; width: 100%; }

        .hidden { display: none; }

        .list-container {
            margin-top: 10px; background: var(--teams-bg);
            padding: 12px; border-radius: 8px; border-left: 4px solid var(--teams-purple);
        }

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--teams-border);
            font-size: 0.9rem;
        }

        .error { border: 2px solid var(--danger) !important; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }

        .modal-content {
            background: var(--teams-card); width: 95%; max-width: 800px;
            border-radius: 12px; padding: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-switch-wrapper">
        <span class="switch-label">Mörkt läge</span>
        <label class="theme-switch">
            <input type="checkbox" id="darkmodeToggle" onclick="toggleDarkMode()">
            <div class="slider"></div>
        </label>
    </div>

    <h2>
        <svg class="icon" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
        Skiftrapport
    </h2>

    <button class="secondary" style="width: 100%; margin-bottom: 15px;" onclick="openStats()">
        <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        Visa statistik
    </button>

    <form id="reportForm">
        <div class="card">
            <label for="signatur">Namn / Rapportör</label>
            <input type="text" id="signatur" placeholder="Skriv ditt namn här..." required>

            <label for="datum">Datum</label>
            <input type="date" id="datum">

            <label for="avdelning">Avdelning</label>
            <select id="avdelning">
                <option value="">-- Välj avdelning --</option>
                <option value="TVS">TVS</option>
                <option value="TPB">TPB</option>
            </select>
        </div>

        <div class="card">
            <label>Truckstatus</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-truck-ok" onclick="setSegment('truck', 'OK')">OK</button>
                <button type="button" class="segment-btn" id="btn-truck-nok" onclick="setSegment('truck', 'Felanmälan (NOK)')">Felanmälan (NOK)</button>
            </div>
            <input type="hidden" id="truck" value="OK">

            <div id="truckContainer" class="hidden">
                <select id="truckId">
                    <option value="">-- Välj Truck --</option>
                    <option>TVS-01</option><option>TVS-02</option><option>TVS-03</option><option>TVS-04</option>
                    <option>TVS-05</option><option>TVS-06</option><option>TVS-13</option><option>TVS-22</option>
                    <option>TVS-23</option><option>TVS-33</option><option>TVS-34</option><option>TPB-07</option>
                    <option>TPB-08</option><option>TPB-09</option><option>TPB-10</option><option>TPB-14</option>
                    <option>TPB-15</option><option>TPB-20</option><option>TPB-21</option><option>Extra truck</option>
                    <option>Grå Skjutsativ</option>
                </select>
                <select id="truckFel">
                    <option value="">-- Välj Feltyp --</option>
                    <option>Hydraulik/Olja</option><option>Chassi</option><option>Stativ</option>
                    <option>Batteri</option><option>Drag</option><option>Däck</option>
                    <option>Linde Connect</option><option>Övrigt</option>
                </select>
                <textarea id="truckKom" placeholder="Kommentar om felet..."></textarea>
                <button type="button" class="add-btn" onclick="addItem('truck')">➕ Lägg till i listan</button>
                <div id="truckList" class="list-container hidden"></div>
            </div>
        </div>

        <div class="card">
            <label>Maskiner & Verktyg</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-maskin-ok" onclick="setSegment('maskin', 'OK')">OK</button>
                <button type="button" class="segment-btn" id="btn-maskin-nok" onclick="setSegment('maskin', 'Felanmälan (NOK)')">Felanmälan (NOK)</button>
            </div>
            <input type="hidden" id="maskin" value="OK">

            <div id="maskinContainer" class="hidden">
                <select id="machineId">
                    <option value="">-- Välj Maskin --</option>
                    <option>Ergopack</option><option>Bandningsmaskin</option><option>Pallyftare</option><option>Övrigt</option>
                </select>
                <select id="machineFel">
                    <option value="">-- Välj Feltyp --</option>
                    <option>Övrigt</option>
                </select>
                <textarea id="machineKom" placeholder="Kommentar om felet..."></textarea>
                <button type="button" class="add-btn" onclick="addItem('machine')">➕ Lägg till i listan</button>
                <div id="machineList" class="list-container hidden"></div>
            </div>
        </div>

        <div class="card">
            <label>Daglig tillsyn truckar</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-tillsyn-ok" onclick="setSegment('tillsyn', 'OK')">OK</button>
                <button type="button" class="segment-btn" id="btn-tillsyn-nok" onclick="setSegment('tillsyn', 'NOK')">NOK</button>
            </div>
            <input type="hidden" id="tillsyn" value="OK">
            <div id="tillsynBox" class="hidden">
                <textarea id="tillsynfel" placeholder="Beskriv vad som saknas i tillsynen"></textarea>
            </div>

            <label>Rengöring av Bandningsmaskiner</label>
            <div class="segmented-control">
                <button type="button" class="segment-btn active" id="btn-rengoring-ok" onclick="setSegment('rengoring', 'OK')">OK</button>
                <button type="button" class="segment-btn" id="btn-rengoring-nok" onclick="setSegment('rengoring', 'Ej utfört')">Ej utfört</button>
            </div>
            <input type="hidden" id="rengoring" value="OK">
            <div id="rengoringBox" class="hidden">
                <textarea id="rengoringKommentar" placeholder="Orsak till utebliven rengöring"></textarea>
            </div>
        </div>

        <div class="card">
            <label>Övrigt</label>
            <textarea id="drift" placeholder="Beskriv eventuella stopp eller problem..."></textarea>
            <textarea id="avvikelse" placeholder="Personal, material etc..."></textarea>
            <textarea id="atgard" placeholder="Vad gjordes för att lösa problemen?"></textarea>
        </div>

        <div class="button-group">
            <button type="button" class="secondary" onclick="clearForm()">Rensa</button>
            <button type="submit" id="submitBtn" class="primary">Skicka Rapport</button>
        </div>
    </form>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <button class="danger" style="margin-bottom: 10px;" onclick="closeStats()">Stäng</button>
        <iframe id="statsFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQY0jbcHllFP-BC4h08x-mU28_9QuPBKOhcB4ue4HFUV8G7daNOsfoTUbAfDnMKmKm2-2T2NDLGDZIW/pubhtml?widget=true&amp;headers=false" width="100%" height="500" style="border:none;"></iframe>
    </div>
</div>

<script>
    let truckArray = [];
    let machineArray = [];

    window.onload = function() {
        document.getElementById('datum').valueAsDate = new Date();
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkmodeToggle').checked = true;
        }
    };

    function toggleDarkMode() {
        const isChecked = document.getElementById('darkmodeToggle').checked;
        document.body.classList.toggle('dark-mode', isChecked);
        localStorage.setItem('theme', isChecked ? 'dark' : 'light');
    }

    function setSegment(type, val) {
        const okBtn = document.getElementById(`btn-${type}-ok`);
        const nokBtn = document.getElementById(`btn-${type}-nok`);
        document.getElementById(type).value = val;

        if (val === 'OK') {
            okBtn.classList.add('active'); nokBtn.classList.remove('active', 'nok');
            if(type === 'truck') toggleSection('truckContainer', 'OK');
            if(type === 'maskin') toggleSection('maskinContainer', 'OK');
            if(type === 'tillsyn') document.getElementById('tillsynBox').classList.add('hidden');
            if(type === 'rengoring') document.getElementById('rengoringBox').classList.add('hidden');
        } else {
            nokBtn.classList.add('active', 'nok'); okBtn.classList.remove('active');
            if(type === 'truck') toggleSection('truckContainer', 'NOK');
            if(type === 'maskin') toggleSection('maskinContainer', 'NOK');
            if(type === 'tillsyn') document.getElementById('tillsynBox').classList.remove('hidden');
            if(type === 'rengoring') document.getElementById('rengoringBox').classList.remove('hidden');
        }
    }

    function toggleSection(containerId, val) {
        const container = document.getElementById(containerId);
        if (val === "NOK") {
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
            if(containerId === 'truckContainer') { truckArray = []; renderList('truck'); }
            if(containerId === 'maskinContainer') { machineArray = []; renderList('machine'); }
        }
    }

    function addItem(type) {
        const idEl = document.getElementById(type === 'truck' ? 'truckId' : 'machineId');
        const felEl = document.getElementById(type === 'truck' ? 'truckFel' : 'machineFel');
        const komEl = document.getElementById(type === 'truck' ? 'truckKom' : 'machineKom');
        if (!idEl.value || !felEl.value) return alert("Välj både enhet och feltyp.");
        
        const item = { id: idEl.value, fel: felEl.value, kom: komEl.value };
        if (type === 'truck') truckArray.push(item);
        else machineArray.push(item);
        idEl.value = ""; felEl.value = ""; komEl.value = "";
        renderList(type);
    }

    function removeItem(type, index) {
        if (type === 'truck') truckArray.splice(index, 1);
        else machineArray.splice(index, 1);
        renderList(type);
    }

    function renderList(type) {
        const listDiv = document.getElementById(type === 'truck' ? 'truckList' : 'machineList');
        const arr = (type === 'truck') ? truckArray : machineArray;
        if (arr.length === 0) { listDiv.classList.add('hidden'); return; }
        listDiv.classList.remove('hidden');
        listDiv.innerHTML = arr.map((item, index) => `
            <div class="list-item">
                <span><strong>${item.id}</strong>: ${item.fel} ${item.kom ? `(${item.kom})` : ''}</span>
                <button type="button" style="width:auto; padding:4px 8px; font-size:12px;" class="danger" onclick="removeItem('${type}', ${index})">Ta bort</button>
            </div>
        `).join('');
    }

    function getSkift() {
        const now = new Date();
        const mins = now.getHours() * 60 + now.getMinutes();
        if (mins >= 350 && mins <= 480) return "Nattskift";
        if (mins >= 840 && mins <= 1020) return "Dagskift";
        if (mins >= 1320 || mins <= 120) return "Kvällsskift";
        return "Okänt skift";
    }

    function openStats(){ document.getElementById("statsModal").style.display = "flex"; }
    function closeStats(){ document.getElementById("statsModal").style.display = "none"; }

    function clearForm() { if(confirm("Vill du verkligen rensa hela formuläret?")) location.reload(); }

    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const signatur = document.getElementById('signatur').value;
        const avdelning = document.getElementById('avdelning');
        if (!signatur) return alert("Vänligen fyll i ditt namn!");
        if (!avdelning.value) { avdelning.classList.add('error'); return alert("Välj avdelning!"); }

        if (document.getElementById('truck').value === "Felanmälan (NOK)" && truckArray.length === 0) return alert("Lägg till truckfel i listan!");
        if (document.getElementById('maskin').value === "Felanmälan (NOK)" && machineArray.length === 0) return alert("Lägg till maskinfel i listan!");

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true; submitBtn.innerText = "Skickar...";

        const formData = {
            signatur: signatur,
            datum: document.getElementById('datum').value,
            avdelning: document.getElementById('avdelning').value,
            skift: getSkift(),
            truckstatus: document.getElementById('truck').value,
            truckar: truckArray,
            maskin: document.getElementById('maskin').value,
            maskiner: machineArray,
            tillsyn: document.getElementById('tillsyn').value,
            tillsynfel: document.getElementById('tillsynfel').value,
            rengoring: document.getElementById('rengoring').value,
            rengoringKommentar: document.getElementById('rengoringKommentar').value,
            drift: document.getElementById('drift').value,
            avvikelse: document.getElementById('avvikelse').value,
            atgard: document.getElementById('atgard').value
        };

        try {
            await fetch("https://script.google.com/macros/s/AKfycbxomhovj11FcLe7xznfkI3IQuOKk0xtOBIY1KN8PyF8h5JOpUdUgzHB6Bq9PIU03uU0/exec", {
                method: "POST", mode: "no-cors", body: JSON.stringify(formData)
            });
        } catch (err) { console.error(err); }

        let mailBody = `SKIFTRAPPORT - ${formData.datum}\nSkift: ${formData.skift}\nAvdelning: ${formData.avdelning}\n\n`;
        mailBody += `Truckstatus: ${formData.truckstatus}\n`;
        truckArray.forEach(t => mailBody += `- ${t.id}: ${t.fel} (${t.kom})\n`);
        mailBody += `\nMaskiner: ${formData.maskin}\n`;
        machineArray.forEach(m => mailBody += `- ${m.id}: ${m.fel} (${m.kom})\n`);
        mailBody += `\nDriftstörningar:\n${formData.drift}\n\nAvvikelser:\n${formData.avvikelse}\n\nÅtgärder:\n${formData.atgard}`;

        const isWindows = navigator.userAgent.toLowerCase().includes("windows");
        const separator = isWindows ? ";" : ",";
        const emails = ["rapport.vovlo@samhall.se", "volvooc@samhall.onmicrosoft.com"].join(separator);
        
        // Här har jag tagit bort namnet från ämnesraden och brödtexten
        window.location.href = `mailto:${emails}?subject=${encodeURIComponent("Skiftrapport " + formData.datum)}&body=${encodeURIComponent(mailBody)}`;

        setTimeout(() => { submitBtn.disabled = false; submitBtn.innerText = "Skicka Rapport"; }, 3000);
    });
</script>

</body>
</html>
